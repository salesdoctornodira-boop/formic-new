/* ── ANALYTICS TAB ─────────────────────────────────────────── */
function AnalyticsView({evals,voterStats,allEmps,theme,t,rules=RULES_DEFAULT,weights=WEIGHTS_DEFAULT,cfg={}}){
  const VKEYS=['commitment','communication','expertise','personality'];
  const VNAMES=[t.vals.commitment.name,t.vals.communication.name,t.vals.expertise.name,t.vals.personality.name];
  const rj=rules.rejectScore;
  const smartOn=cfg.smartAnalytics!=='0';   // s14 §4.2: relative "smart" coverage metric available (default ON)
  // s14 §4.3 — selectable ranking metric for the dept table: 'score' (DCS/Final, default) | 'votes' (Abs count) |
  // 'sum' (total of all given scores) | 'coverage' (smart % of eligible voters). Lets HRD compare unequal-size depts fairly.
  const[metric,setMetric]=useState('score');

  // ANALYTICS-1: a deactivated (soft-deleted) employee disappears from EVERY score aggregate, not only the
  // personal ranking (empRank already filtered active). We drop evals whose TARGET (eval_to) is inactive —
  // anonymous evaluators use non-roster anon_* ids, so filtering by the evaluator side isn't possible/meaningful.
  const liveEvals=useMemo(()=>{
    const activeIds=new Set(allEmps.filter(e=>e.active!=0).map(e=>e.id));
    return evals.filter(ev=>activeIds.has(ev.eval_to));
  },[evals,allEmps]);

  // M2b: id→employee map so pooled aggregates can resolve each RATED person's role for per-role value weights.
  const empById=useMemo(()=>{const m={};(allEmps||[]).forEach(e=>{m[e.id]=e;});return m;},[allEmps]);

  // s14 §4.2 — eligible-voter denominator. For each TARGET, how many roster members are mandated to rate them
  // (reverse of getMandatoryTargets). Anonymous code respondents aren't in the roster, so this is the EXPECTED voter
  // count = "max possible votes". coverage% = received / eligible. Computed once over the active roster (O(N·targets)).
  const eligibleMap=useMemo(()=>{
    const m={}; const active=allEmps.filter(e=>e.active!=0);
    active.forEach(V=>{ getMandatoryTargets(V,allEmps,cfg).forEach(tg=>{ m[tg.id]=(m[tg.id]||0)+1; }); });
    return m;
  },[allEmps,cfg]);
  const covPct=(received,eligible)=>eligible>0?Math.min(100,Math.round(received/eligible*100)):0;

  const empRank=useMemo(()=>{
    const st={};allEmps.filter(e=>e.active!=0).forEach(e=>{st[e.id]={...e,sum:0,cnt:0,evCnt:0,
      bv:{commitment:[],communication:[],expertise:[],personality:[]},
      peer:{commitment:[],communication:[],expertise:[],personality:[]},
      finExec:{commitment:[],communication:[],expertise:[],personality:[]},
      finLin:{commitment:[],communication:[],expertise:[],personality:[]}};});
    evals.forEach(ev=>{
      const tgt=st[ev.eval_to]; if(!tgt) return;
      let es=0,ec=0;
      VKEYS.forEach(k=>{const s=effScore(ev.scores?.[k]||{skipped:true},rj);if(s!==null){es+=s;ec++;tgt.bv[k].push(s);
        if(ev.evaluatorRole==='manager') (ev.evaluatorLevel==='exec'?tgt.finExec:tgt.finLin)[k].push(s);
        else tgt.peer[k].push(s);}});
      if(ec>0){tgt.sum+=es;tgt.cnt+=ec;tgt.evCnt++;}
    });
    return Object.values(st).filter(e=>e.cnt>0).map(e=>{
      // M2: weighted DCS when enabled; otherwise the exact previous simple average (sum/cnt).
      let avgVal=parseFloat((e.sum/e.cnt).toFixed(1));
      if(weights.enabled){const d=weightedDCS(e.peer,e.finExec,e.finLin,weights,vwOf(weights,e));if(d!=null)avgVal=parseFloat(d.toFixed(1));}
      return{...e,avg:avgVal,
        pct:Math.round((avgVal/10)*100),   // Req3: individual result as % of the max score (10) — e.g. 5/10 → 50%
        eligible:eligibleMap[e.id]||0,coverage:covPct(e.evCnt,eligibleMap[e.id]||0),   // §4.2 per-employee smart %
        cA:avg(e.bv.commitment),coA:avg(e.bv.communication),exA:avg(e.bv.expertise),pA:avg(e.bv.personality)};
    }).sort((a,b)=>b.avg-a.avg);
  },[evals,allEmps,rj,weights,eligibleMap]);

  const crossProjStats=useMemo(()=>{
    let pS=0,pC=0,mS=0,mC=0;const mgrV=new Set(),peerV=new Set();
    liveEvals.forEach(ev=>{const isM=ev.evaluatorRole==='manager';VKEYS.forEach(k=>{const s=effScore(ev.scores?.[k]||{skipped:true},rj);if(s===null)return;if(isM){mS+=s;mC++;mgrV.add(ev.eval_from);}else{pS+=s;pC++;peerV.add(ev.eval_from);}});});
    // peer/mgr are the raw Final & Peer COMPONENTS (shown side-by-side); dcs = the single weighted composite
    // (WEIGHTS-CONSISTENCY) shown only when weights are ON. mgrVoters/peerVoters = VOTES-COUNT (how many voted).
    // s12 (#1/#2): voter COUNTS come from the server (voterStats) because the corpus pseudonym is now per-row
    // (non-clusterable) — the client Sets (mgrV/peerV over per-row tokens) would over-count. Fallback to local only
    // if the server field is absent (legacy response).
    return{peer:pC?parseFloat((pS/pC).toFixed(1)):0,mgr:mC?parseFloat((mS/mC).toFixed(1)):0,mgrVoters:voterStats?voterStats.mgrVoters:mgrV.size,peerVoters:voterStats?voterStats.peerVoters:peerV.size,dcs:poolScore(liveEvals,rj,weights,empById)};
  },[liveEvals,rj,weights,voterStats,empById]);

  const valueStats=useMemo(()=>VKEYS.map(k=>{
    let s=0,c=0;liveEvals.forEach(ev=>{const sc=effScore(ev.scores?.[k]||{skipped:true},rj);if(sc!==null){s+=sc;c++;}});
    return{key:k,avg:c?parseFloat((s/c).toFixed(1)):0,count:c};   // count ≈ voters (each evaluator rates ≤1 per value)
  }),[liveEvals,rj]);

  const projStats=useMemo(()=>{
    const projs=[...new Set(allEmps.filter(e=>e.active!=0).map(e=>e.project))];
    return projs.map(proj=>{
      const ids=new Set(allEmps.filter(e=>e.active!=0&&e.project===proj).map(e=>e.id));
      const pe=liveEvals.filter(ev=>ids.has(ev.eval_to));
      let sum=0;pe.forEach(ev=>VKEYS.forEach(k=>{const s=effScore(ev.scores?.[k]||{skipped:true},rj);if(s!==null)sum+=s;}));
      let elig=0;ids.forEach(id=>{elig+=(eligibleMap[id]||0);});
      // §4.2/§4.3: votes = received (voter,target) pairs; sum = total of all given scores; coverage = received/eligible %.
      return{project:proj,avg:poolScore(pe,rj,weights,empById),cnt:pe.length,votes:pe.length,sum:Math.round(sum),eligible:elig,coverage:covPct(pe.length,elig)};
    }).sort((a,b)=>b.avg-a.avg);
  },[liveEvals,allEmps,rj,weights,eligibleMap,empById]);

  const deptStats=useMemo(()=>{
    const depts=[...new Set(allEmps.filter(e=>e.active!=0).map(e=>e.dept))];
    return depts.map(dept=>{
      const ids=new Set(allEmps.filter(e=>e.active!=0&&e.dept===dept).map(e=>e.id));
      const de=liveEvals.filter(ev=>ids.has(ev.eval_to));
      let pS=0,pC=0,mS=0,mC=0;
      de.forEach(ev=>VKEYS.forEach(k=>{const sc=effScore(ev.scores?.[k]||{skipped:true},rj);if(sc===null)return;if(ev.evaluatorRole==='manager'){mS+=sc;mC++;}else{pS+=sc;pC++;}}));
      // dcs = weighted composite (WEIGHTS-CONSISTENCY) used as the headline + sort key when weights ON; mgr/peer
      // stay as the raw Final/Peer components. When weights OFF the panel is unchanged (sort by mgr).
      // §4.2/§4.3: votes = received (voter,target) pairs; sum = total of all given scores; coverage = received/eligible %.
      let elig=0;ids.forEach(id=>{elig+=(eligibleMap[id]||0);});
      return{dept,peer:pC?parseFloat((pS/pC).toFixed(1)):0,mgr:mC?parseFloat((mS/mC).toFixed(1)):0,dcs:poolScore(de,rj,weights,empById),
        votes:de.length,sum:Math.round(mS+pS),eligible:elig,coverage:covPct(de.length,elig)};
    }).sort((a,b)=>weights.enabled?(b.dcs-a.dcs):(b.mgr-a.mgr));
  },[liveEvals,allEmps,rj,weights,eligibleMap,empById]);

  // KPI cards use liveEvals too (ANALYTICS-1, audit s8): a deactivated target's rows are dropped here as well, so
  // the Total/Participants/Manager-evals headline reconciles with the score panels below (which all use liveEvals).
  // s12 (#1/#2): uniq (distinct voters) from the server — the per-row corpus pseudonym can't be distinct-counted client-side.
  const total=liveEvals.length,peerCnt=liveEvals.filter(e=>e.evaluatorRole!=='manager').length,mgrCnt=liveEvals.filter(e=>e.evaluatorRole==='manager').length,uniq=voterStats?voterStats.uniq:new Set(liveEvals.map(e=>e.eval_from)).size;

  // (chart data used by sub-components)

  return(
    <div className="space-y-6 fade-up">
      {/* KPI cards */}
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
        {[{l:t.total_e,v:total,icon:BarChart3,clr:'#00C76E',tip:t.tip_total},{l:t.partic,v:uniq,icon:Users,clr:'#3B82F6',tip:t.tip_partic},{l:t.mgr_e,v:mgrCnt,icon:Crown,clr:'#F59E0B',tip:t.tip_mgr}].map(({l,v,icon:Icon,clr,tip})=>(
          <div key={l} className={`${theme.card} rounded-2xl p-5 border ${theme.border} card-hover relative overflow-hidden`}>
            <div className="absolute inset-x-0 top-0 h-1" style={{background:`linear-gradient(90deg,${clr},${clr}26)`}}/>
            <div className="flex items-center justify-between mb-3">
              <div className="w-11 h-11 rounded-xl flex items-center justify-center" style={{background:clr+'1f',boxShadow:`0 6px 16px -4px ${clr}55`}}><Icon size={21} style={{color:clr}}/></div>
              <span className={`text-3xl font-black font-mono tabular-nums`} style={{color:clr}}>{v}</span>
            </div>
            <p className={`text-xs font-semibold ${theme.muted} flex items-center`}>{l}<Hint tip={tip}/></p>
          </div>
        ))}
      </div>

      {/* Cross-project score + Donuts — flagship hero (dark "command center", works on both themes, keeps score color-coding) */}
      <div className="rounded-2xl p-6 sm:p-7 relative overflow-hidden shadow-xl border border-[#00C76E]/20" style={{background:'linear-gradient(135deg,#0a2627 0%,#0f3a3c 60%,#0a2627 100%)'}}>
        <div className="absolute -top-20 -right-16 w-64 h-64 rounded-full pointer-events-none" style={{background:'radial-gradient(circle,rgba(0,199,110,.18),transparent 70%)'}}/>
        <div className="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-[#00C76E] via-[#00C76E]/40 to-transparent"/>
        <div className="relative">
          <div className="flex items-center justify-between mb-6 flex-wrap gap-2">
            <h3 className="font-black text-lg text-white flex items-center gap-2"><span className="w-8 h-8 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><TrendingUp size={18} className="text-[#00C76E]"/></span>{t.company_r}<Hint tip={t.tip_company} size={15}/></h3>
            {weights.enabled&&<span className="tooltip text-[11px] font-black px-2.5 py-1 rounded-lg bg-[#00C76E]/15 text-[#00C76E] border border-[#00C76E]/30 flex items-center gap-1.5" data-tip={t.weights_scope_note}><Zap size={12}/>DCS {crossProjStats.dcs||'—'}</span>}
          </div>
          <div className="flex flex-wrap items-center gap-x-10 gap-y-6">
            <div className="text-center">
              <div className={`text-6xl font-black font-mono leading-none mb-1.5 ${scoreTxt(crossProjStats.mgr)}`}>{crossProjStats.mgr||'—'}</div>
              <div className="text-xs font-semibold text-slate-300 flex items-center justify-center gap-1"><Crown size={12} className="text-[#F59E0B]"/>{t.mgr_s}<Hint tip={t.tip_final} size={12}/></div>
              <div className="text-[11px] text-slate-400 mt-1 flex items-center justify-center gap-1"><Users2 size={11} className="text-[#00C76E]"/><b className="text-slate-200">{crossProjStats.mgrVoters}</b> {t.voters_word}</div>
            </div>
            <div className="text-center">
              <div className={`text-4xl font-black font-mono leading-none mb-1.5 ${scoreTxt(crossProjStats.peer)}`}>{crossProjStats.peer||'—'}</div>
              <div className="text-xs font-semibold text-slate-300 flex items-center justify-center gap-1"><Users size={12} className="text-[#3B82F6]"/>{t.peer_s}<Hint tip={t.tip_peer} size={12}/></div>
              <div className="text-[11px] text-slate-400 mt-1 flex items-center justify-center gap-1"><Users2 size={11} className="text-[#3B82F6]"/><b className="text-slate-200">{crossProjStats.peerVoters}</b> {t.voters_word}</div>
            </div>
            <div className="hidden sm:block w-px self-stretch bg-white/10"/>
            <div className="flex gap-5 flex-wrap">
              {valueStats.map(({key,avg:va,count})=>(
                <div key={key} className="flex flex-col items-center text-slate-200">
                  <Donut value={va} size={80} color={scoreClr(va)} bg="rgba(255,255,255,.1)"
                    label={t.vals[key].name} theme={theme}/>
                  <div className="text-xs text-slate-300 mt-1.5 flex items-center gap-1.5"><Users2 size={13} className="text-[#3B82F6]"/><b className="text-white text-sm tabular-nums">{count}</b> {t.n_votes}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Top-5 + Project bars */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div className={`${theme.card} rounded-2xl p-6 border ${theme.border} card-hover`}>
          <h3 className={`font-black text-base ${theme.txt} mb-5 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#F59E0B]/15 flex items-center justify-center flex-shrink-0"><Trophy size={16} className="text-[#F59E0B]"/></span>Top-5<Hint tip={t.tip_top5}/></h3>
          <Top5Cards empRank={empRank} valNames={VNAMES} theme={theme} t={t} showCoverage={smartOn}/>
        </div>
        <div className={`${theme.card} rounded-2xl p-6 border ${theme.border} card-hover`}>
          <h3 className={`font-black text-base ${theme.txt} mb-5 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#3B82F6]/15 flex items-center justify-center flex-shrink-0"><BarChart size={16} className="text-[#3B82F6]"/></span>{t.by_proj}<Hint tip={t.tip_proj}/></h3>
          <ProjectBars items={projStats.map(p=>({label:p.project,value:p.avg}))} theme={theme}/>
        </div>
      </div>

      {/* Value bars + Dept table */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div className={`${theme.card} rounded-2xl p-6 border ${theme.border} card-hover`}>
          <h3 className={`font-black text-base ${theme.txt} mb-5 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#8B5CF6]/15 flex items-center justify-center flex-shrink-0"><Gem size={16} className="text-[#8B5CF6]"/></span>{t.by_val}<Hint tip={t.tip_value}/></h3>
          {valueStats.map(({key,avg:va,count})=>(
            <div key={key} className="mb-4">
              <div className="flex justify-between items-center mb-2">
                <span className={`text-sm font-black ${theme.txt}`}>{t.vals[key].name}</span>
                <div className="flex items-center gap-3">
                  <span className={`text-xs ${theme.muted} flex items-center gap-1`}><Users2 size={11}/>{count} {t.n_votes}</span>
                  <span className={`text-lg font-black font-mono`} style={{color:scoreClr(va)}}>{va||'—'}</span>
                </div>
              </div>
              <div className="h-2.5 rounded-full overflow-hidden" style={{background:theme.d?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}}>
                <div className="h-full rounded-full transition-all duration-700" style={{width:`${(va/10)*100}%`,background:scoreClr(va)}}/>
              </div>
            </div>
          ))}
        </div>

        <div className={`${theme.card} rounded-2xl p-6 border ${theme.border} card-hover`}>
          <div className="flex items-center justify-between flex-wrap gap-2 mb-4">
            <h3 className={`font-black text-base ${theme.txt} flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/12 flex items-center justify-center flex-shrink-0"><Building2 size={16} className="text-[#00C76E]"/></span>{t.dept_dcs}<Hint tip={smartOn?t.tip_metric:t.dcs_tip}/></h3>
            {/* s14 §4.3 — selectable ranking metric (fair comparison of unequal-size depts) */}
            <div className={`flex ${theme.input} rounded-lg p-0.5 text-[11px] font-bold`}>
              {[['score',t.m_score],['votes',t.m_votes],['sum',t.m_sum],...(smartOn?[['coverage',t.m_coverage]]:[])].map(([k,lbl])=>(
                <button key={k} onClick={()=>setMetric(k)} className={`px-2.5 py-1 rounded-md transition-all ${metric===k?'bg-[#00C76E] text-white':theme.muted}`}>{lbl}</button>
              ))}
            </div>
          </div>
          {(()=>{
            const mval=d=>metric==='votes'?d.votes:metric==='sum'?d.sum:metric==='coverage'?d.coverage:(weights.enabled?d.dcs:d.mgr);
            const sorted=[...deptStats].sort((a,b)=>mval(b)-mval(a));
            const mlabel=metric==='votes'?t.m_votes:metric==='sum'?t.m_sum:metric==='coverage'?t.m_coverage:(weights.enabled?'DCS':t.mgr_s);
            const disp=d=>{const v=mval(d);return metric==='coverage'?(v+'%'):metric==='votes'||metric==='sum'?String(v):(v||'—');};
            const clr=d=>metric==='score'?scoreClr(mval(d)):'#00C76E';
            return(
            <div className="space-y-3 overflow-y-auto scrollbar" style={{maxHeight:280}}>
              {sorted.map((d,i)=>(
                <div key={d.dept} className={`${theme.input} rounded-xl p-3 flex items-center gap-3 border ${theme.border}`}>
                  <span className={`text-sm font-black w-5 text-center ${theme.muted}`}>#{i+1}</span>
                  <span className={`flex-1 text-sm font-semibold ${theme.txt} truncate`}>{d.dept}</span>
                  <div className="flex items-center gap-3">
                    <div className="text-right"><div className={`text-[10px] ${theme.muted}`}>{mlabel}</div><div className={`text-base font-black font-mono`} style={{color:clr(d)}}>{disp(d)}</div></div>
                    {smartOn&&metric!=='coverage'&&<div className="text-right"><div className={`text-[10px] ${theme.muted}`}>{t.m_coverage}</div><div className={`text-sm font-bold font-mono ${theme.sub}`}>{d.coverage}%</div></div>}
                    <div className="text-right"><div className={`text-[10px] ${theme.muted} flex items-center gap-1`}><Crown size={10}/>{t.mgr_s}</div><div className={`text-sm font-bold font-mono`} style={{color:scoreClr(d.mgr)}}>{d.mgr||'—'}</div></div>
                  </div>
                </div>
              ))}
            </div>);
          })()}
        </div>
      </div>

      {/* Employee ranking with per-value */}
      <div className={`${theme.card} rounded-2xl border ${theme.border} overflow-hidden`}>
        <div className={`px-6 py-4 border-b ${theme.border} flex items-center justify-between`}>
          <h3 className={`font-black text-base ${theme.txt} flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/12 flex items-center justify-center flex-shrink-0"><Trophy size={16} className="text-[#00C76E]"/></span>{t.overall} — {t.by_val}<Hint tip={t.tip_overall}/></h3>
          <button onClick={()=>window.location.href=`${API}?action=export_csv`} className={`flex items-center gap-2 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}><Download size={14} className="text-[#00C76E]"/>CSV</button>
          <button onClick={()=>window.location.href=`${API}?action=export_xlsx`} className={`flex items-center gap-2 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#3B82F6] transition-all`}><Download size={14} className="text-[#3B82F6]"/>XLSX</button>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm min-w-[940px]">
            <thead className={theme.thead}>
              <tr>
                <th className="px-4 py-3 w-[70px]">#</th>
                <th className="px-4 py-3">{t.emp}</th>
                <th className="px-4 py-3">{t.d_col}</th>
                <th className="px-4 py-3 text-center w-[86px]">{t.cmm_a}</th>
                <th className="px-4 py-3 text-center w-[86px]">{t.com_a}</th>
                <th className="px-4 py-3 text-center w-[86px]">{t.exp_a}</th>
                <th className="px-4 py-3 text-center w-[86px]">{t.per_a}</th>
                <th className="px-4 py-3 text-center w-[84px]">{t.votes_col}</th>
                <th className="px-4 py-3 text-right font-black w-[168px]">{t.result_col}</th>
              </tr>
            </thead>
            <tbody className={`divide-y ${theme.divider}`}>
              {empRank.map((e,i)=>(
                <tr key={e.id} className={`${theme.trow} transition-colors`}>
                  <td className="px-4 py-3">{i<3
                    ?<span className="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-black text-white" style={{background:['#F59E0B','#9CA3AF','#B45309'][i],boxShadow:`0 2px 8px -1px ${['#F59E0B','#9CA3AF','#B45309'][i]}99`}}>{i+1}</span>
                    :<span className={`font-black font-mono ${theme.muted}`}>#{i+1}</span>}</td>
                  <td className="px-4 py-3">
                    <div className="flex items-center gap-3 min-w-0">
                      <EmpPhoto id={e.id} name={e.name} size={32}/>
                      <div className="min-w-0">
                        <div className={`font-semibold ${theme.txt} truncate leading-5`}>
                          {e.name}
                          {e.is_head==1&&<span className="ml-1.5 inline-flex align-middle text-[9px] font-black text-[#00C76E] border border-[#00C76E]/40 px-1.5 py-0.5 rounded leading-none">HEAD</span>}
                        </div>
                        <div className={`text-[11px] ${theme.muted} truncate`}>{e.project||''}</div>
                      </div>
                    </div>
                  </td>
                  <td className={`px-4 py-3 ${theme.muted}`}>
                    <span className="truncate block max-w-[240px]">{e.dept}</span>
                  </td>
                  {[e.cA,e.coA,e.exA,e.pA].map((v,i2)=>(
                    <td key={i2} className={`px-4 py-3 text-center font-black font-mono tabular-nums`} style={{color:v>0?scoreClr(v):'#94a3b8'}}>
                      {v||'—'}
                    </td>
                  ))}
                  <td className="px-4 py-3 text-center"><span className={`inline-flex items-center gap-1 text-xs font-bold tabular-nums ${theme.muted}`}><Users2 size={11} className="text-[#00C76E]"/>{e.evCnt}</span></td>
                  {/* Req3: individual performance — absolute score/10, percent of max, and a progress bar */}
                  <td className="px-4 py-3">
                    <div className="flex flex-col items-end gap-1 min-w-[128px] ml-auto">
                      <div className="flex items-baseline gap-1 justify-end">
                        <span className="font-black font-mono text-base tabular-nums" style={{color:scoreClr(e.avg)}}>{e.avg}</span>
                        <span className={`text-[11px] font-semibold ${theme.muted}`}>/10</span>
                        <span className="text-xs font-black tabular-nums ml-1" style={{color:scoreClr(e.avg)}}>{e.pct}%</span>
                      </div>
                      <div className="w-full h-2 rounded-full overflow-hidden" style={{background:theme.d?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)'}}>
                        <div className="h-full rounded-full transition-all duration-700" style={{width:`${e.pct}%`,background:scoreClr(e.avg)}}/>
                      </div>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {empRank.length===0&&<div className={`p-10 text-center ${theme.muted} text-sm`}>{t.no_data}</div>}
      </div>
    </div>
  );
}


/* ── PROGRESS MONITOR (s14 §3 — anonymity-safe completion dashboard) ─── */
// Superadmin/admin → all depts; a manager (passed onBack) → only their scoped depts (server enforces). Aggregates
// only: completed / in-progress / not-started per project|dept + a stacked bar. No names — cannot tell WHO is behind.
function ProgressMonitor({theme,t,onBack}){
  const[rows,setRows]=useState(null);
  useEffect(()=>{api('get_progress').then(r=>setRows(r&&r.success?(r.data||[]):[])).catch(()=>setRows([]));},[]);
  const Bar=({c,p,n})=>{const s=Math.max(1,c+p+n);return(
    <div className="flex h-2.5 rounded-full overflow-hidden bg-slate-400/15 mt-2">
      <div style={{width:(c/s*100)+'%'}} className="bg-[#00C76E]" title={t.mon_completed}/>
      <div style={{width:(p/s*100)+'%'}} className="bg-amber-400" title={t.mon_inprogress}/>
      <div style={{width:(n/s*100)+'%'}} className="bg-slate-400/40" title={t.mon_notstarted}/>
    </div>);};
  const Legend=()=>(
    <div className={`flex items-center gap-4 text-xs ${theme.muted} flex-wrap`}>
      <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-[#00C76E]"/>{t.mon_completed}</span>
      <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-amber-400"/>{t.mon_inprogress}</span>
      <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full bg-slate-400/50"/>{t.mon_notstarted}</span>
    </div>
  );
  return(
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h2 className={`text-xl font-black ${theme.txt} flex items-center gap-2`}><span className="w-8 h-8 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Activity size={18} className="text-[#00C76E]"/></span>{t.progress_title}</h2>
        {onBack&&<button onClick={onBack} className={`text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}>← {t.back}</button>}
      </div>
      {rows===null?<div className={`text-center py-10 ${theme.muted}`}>{t.loading}</div>
       :!rows.length?<div className={`text-center py-10 ${theme.muted}`}>{t.no_data}</div>
       :(()=>{
        const tot=rows.reduce((a,r)=>({hc:a.hc+r.headcount,c:a.c+r.completed,p:a.p+r.in_progress,n:a.n+r.not_started,cl:a.cl+r.claimed}),{hc:0,c:0,p:0,n:0,cl:0});
        const byProj={};rows.forEach(r=>{(byProj[r.project]=byProj[r.project]||[]).push(r);});
        return(<div className="space-y-6">
          {/* overall */}
          <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>
            <div className="flex items-end justify-between mb-1">
              <span className={`text-sm font-bold ${theme.txt}`}>{t.mon_overall}</span>
              <span className="text-2xl font-black text-[#00C76E]">{tot.c}<span className={`text-base font-semibold ${theme.muted}`}> / {tot.hc}</span></span>
            </div>
            <Bar c={tot.c} p={tot.p} n={tot.n}/>
            <div className="flex items-center justify-between mt-3"><Legend/><span className={`text-xs ${theme.muted}`}>{t.mon_codes}: <b className={theme.txt}>{tot.cl}</b> / {tot.hc}</span></div>
          </div>
          {/* per project → per dept */}
          {Object.keys(byProj).sort().map(proj=>(
            <div key={proj} className="space-y-3">
              <h3 className={`text-sm font-black ${theme.txt}`}>{proj}</h3>
              <div className="space-y-3">
                {byProj[proj].map(r=>(
                  <div key={r.dept} className={`${theme.card2} rounded-2xl p-4 border ${theme.border}`}>
                    <div className="flex items-center justify-between gap-3">
                      <span className={`text-sm font-bold ${theme.txt}`}>{r.dept}</span>
                      <span className={`text-sm font-black ${theme.txt}`}>{r.completed}<span className={`text-xs font-semibold ${theme.muted}`}> / {r.headcount}</span></span>
                    </div>
                    <Bar c={r.completed} p={r.in_progress} n={r.not_started}/>
                    <div className={`flex items-center gap-3 text-[11px] ${theme.muted} mt-2 flex-wrap`}>
                      <span className="text-[#00C76E] font-bold">✓ {r.completed} {t.mon_completed}</span>
                      <span className="text-amber-500 font-bold">◐ {r.in_progress} {t.mon_inprogress}</span>
                      <span>○ {r.not_started} {t.mon_notstarted}</span>
                      <span className="opacity-70">· {t.mon_codes}: {r.claimed}/{r.headcount}</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>);
       })()}
    </div>
  );
}

/* ── HEADS PANEL (Rahbarlar paneli) — per-head MANUAL evaluation routing (s17 §4) ─────────────
   Superadmin picks a head, flips "manual" ON, and explicitly lists whom that head must evaluate. In manual mode the
   head's auto scope/role routing is bypassed and Global is NOT forced into their mandatory set (see getMandatoryTargets):
   only the picked people are mandatory, everything else (incl. Global) falls to the optional "Recommended" step.
   Reuses the rate_extra (whom they evaluate) / rate_block (hidden) columns; head_manual switches the routing mode. */
function HeadsPanel({allEmps,saveEmp,theme,t}){
  const heads=(allEmps||[]).filter(e=>e.is_head==1&&e.active!=0).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const[sel,setSel]=useState('');
  const[search,setSearch]=useState('');
  const[saving,setSaving]=useState(false);
  const head=heads.find(h=>h.id===sel)||null;
  // Local draft so chip toggles don't hit the network per click — Save commits via save_employee (saveEmp refreshes allEmps).
  const[draft,setDraft]=useState({manual:0,extra:[],block:[]});
  useEffect(()=>{
    setDraft(head?{manual:(parseInt(head.head_manual)||0),extra:jarr(head.rate_extra),block:jarr(head.rate_block)}:{manual:0,extra:[],block:[]});
    setSearch('');
  },[sel,head&&head.head_manual,head&&head.rate_extra,head&&head.rate_block]);
  const iCls=`w-full px-3.5 py-2.5 rounded-xl text-sm border outline-none focus:border-[#00C76E] transition-all ${theme.input} ${theme.txt} ${theme.border}`;
  const dirty=head&&(draft.manual!==(parseInt(head.head_manual)||0)||JSON.stringify(draft.extra)!==JSON.stringify(jarr(head.rate_extra))||JSON.stringify(draft.block)!==JSON.stringify(jarr(head.rate_block)));
  const setT=(id,kind)=>setDraft(p=>{const extra=p.extra.filter(x=>x!==id),block=p.block.filter(x=>x!==id);if(kind==='extra')extra.push(id);if(kind==='block')block.push(id);return {...p,extra,block};});
  const save=async()=>{ if(!head)return; setSaving(true); const payload={...head,head_manual:draft.manual,rate_extra:draft.extra,rate_block:draft.block}; delete payload.has_photo; await saveEmp(payload); setSaving(false); };
  const selectedSet=new Set([...draft.extra,...draft.block]);
  const q=search.trim().toLowerCase();
  const pool=(allEmps||[]).filter(e=>e.active!=0&&head&&e.id!==head.id);
  const matches=q?pool.filter(e=>!selectedSet.has(e.id)&&((e.name||'').toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q))):[];
  const shown=[...pool.filter(e=>selectedSet.has(e.id)),...matches.slice(0,30)];
  return(
    <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border} space-y-4`}>
      <h3 className={`font-bold ${theme.txt} flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#F59E0B]/15 flex items-center justify-center flex-shrink-0"><Crown size={16} className="text-[#F59E0B]"/></span>{t.hp_title}</h3>
      <p className={`text-[11px] leading-4 ${theme.muted}`}>{t.hp_hint}</p>
      <select value={sel} onChange={e=>setSel(e.target.value)} className={iCls}>
        <option value="">{t.hp_select}</option>
        {heads.map(h=><option key={h.id} value={h.id}>{h.name} — {h.dept} · {h.project}{(parseInt(h.head_manual)||0)===1?' ✓':''}</option>)}
      </select>
      {!head ? <p className={`text-[11px] ${theme.muted} text-center py-2`}>{heads.length?t.hp_none_sel:t.hp_no_heads}</p> : (<>
        <div className={`flex items-center justify-between ${theme.input} px-4 py-3 rounded-xl border ${theme.border} gap-3`}>
          <div className="min-w-0"><span className={`text-sm ${theme.sub}`}>{t.hp_manual}</span><p className={`text-[11px] leading-4 ${theme.muted} mt-0.5`}>{t.hp_manual_hint}</p></div>
          <Toggle on={draft.manual===1} onChange={()=>setDraft(p=>({...p,manual:p.manual?0:1}))} theme={theme}/>
        </div>
        {draft.manual===1&&(<>
          <div className="relative">
            <Search size={14} className={`absolute left-3 top-1/2 -translate-y-1/2 ${theme.muted}`}/>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.ov_search_ph} className={`${iCls} pl-9`}/>
          </div>
          <div className="flex gap-3 text-[11px] font-semibold"><span className="text-[#00C76E]">{t.ov_extra}: {draft.extra.length}</span><span className="text-red-400">{t.ov_block}: {draft.block.length}</span></div>
          {shown.length>0
            ? <div className="space-y-1 max-h-52 overflow-y-auto scrollbar pr-0.5">{shown.map(e=>{
                const isX=draft.extra.includes(e.id),isB=draft.block.includes(e.id);
                return(<div key={e.id} className={`flex items-center justify-between gap-2 px-2.5 py-1.5 rounded-lg ${theme.card}`}>
                  <div className="min-w-0 flex items-center gap-2"><EmpPhoto id={e.id} name={e.name} size={22}/><div className="min-w-0"><div className={`text-xs font-semibold truncate ${theme.txt}`}>{e.name}</div><div className={`text-[10px] truncate ${theme.muted}`}>{e.dept} · {e.project}{e.is_head==1?' · '+t.head_t:''}</div></div></div>
                  <div className="flex gap-1 flex-shrink-0">
                    <button type="button" onClick={()=>setT(e.id,isX?'none':'extra')} className={`px-2 py-1 rounded-md text-[10px] font-bold border transition-all ${isX?'bg-[#00C76E] text-white border-[#00C76E]':`${theme.input} ${theme.muted} ${theme.border} hover:border-[#00C76E]/50`}`}>{t.ov_extra_short}</button>
                    <button type="button" onClick={()=>setT(e.id,isB?'none':'block')} className={`px-2 py-1 rounded-md text-[10px] font-bold border transition-all ${isB?'bg-red-500 text-white border-red-500':`${theme.input} ${theme.muted} ${theme.border} hover:border-red-400/50`}`}>{t.ov_block_short}</button>
                  </div>
                </div>);
              })}</div>
            : <p className={`text-[11px] ${theme.muted} text-center py-2`}>{q?t.ov_none:t.ov_search_hint}</p>}
          {q&&matches.length>30&&<p className={`text-[10px] ${theme.muted} text-center`}>{t.ov_more}</p>}
        </>)}
        <button onClick={save} disabled={!dirty||saving} className="w-full bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold py-2.5 rounded-xl transition-all active:scale-95 disabled:opacity-40 flex items-center justify-center gap-2">{saving?<><span className="spinner"/>{t.saving}</>:<><Save size={15}/>{t.save}</>}</button>
      </>)}
    </div>
  );
}

/* ── ADMIN DASHBOARD ──────────────────────────────────────── */
function AdminDash({evals,setEvals,voterStats,setVoterStats,settings,setSettings,theme,t,allEmps,setAllEmps,isSuperAdmin,subStats,setSubStats,valuesConfig,setValuesConfig,rules=RULES_DEFAULT,weights=WEIGHTS_DEFAULT,refreshConfig}){
  const{reloadPhotos}=useContext(PhotoCtx);   // B-4: refresh shared photo cache after employee edits
  const[atab,setAtab]=useState('dash');
  const[fDept,setFDept]=useState('');
  const[fEmp,setFEmp]=useState('');                    // REPORT-FILTER: pick one employee ('' = all)
  const[expandedReport,setExpandedReport]=useState(()=>new Set()); // REPORT-FILTER: collapsed by default
  const[empQ,setEmpQ]=useState('');
  const[editEmpModal,setEditEmpModal]=useState(null);
  const[editEvalModal,setEditEvalModal]=useState(null);
  const[editScore,setEditScore]=useState({score:'',text:'',status:'approved'});
  const[showReset,setShowReset]=useState(false);
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  const[showInactive,setShowInactive]=useState(false);

  // Settings form state
  const[nALog,setNALog]=useState(settings.adminLogin||'');
  const[nAPass,setNAPass]=useState('');
  const[nHPass,setNHPass]=useState('');
  const[nSLog,setNSLog]=useState(settings.superLogin||'');
  const[nSPass,setNSPass]=useState('');

  const VKEYS=['commitment','communication','expertise','personality'];

  const anomalies=[],redFlags=[];
  evals.forEach(ev=>{
    // Anonymity (s11): author identity is confidential — the server never sends a real eval_from anymore, so we
    // label by ROLE only (Руководитель / Сотрудник) + the HEAD badge. A name appears only via deliberate
    // "Служебное раскрытие (под лог)" (CSV deanon → reveal_log), never inline by default.
    const fn=ev.evaluatorRole==='manager'?t.head_t:t.emp_t;
    const te=allEmps.find(e=>e.id===ev.eval_to);
    const tn=te?.head_role||te?.name;
    // Show the target's CURRENT dept (matches the name above + every dashboard, which re-keys on the live
    // record). If the super-admin moved them mid-cycle, the stored ev.toDept snapshot would otherwise
    // contradict the dashboards; fall back to the snapshot only if the person left the roster. (Audit GAP A.)
    const tdept=te?.dept||ev.toDept;
    VKEYS.forEach(key=>{
      const val=ev.scores?.[key]||{};
      if(val.skipped)return;
      if(val.score>=rules.moderationThreshold&&val.status==='pending') anomalies.push({evalId:ev.id,key,val,from:fn,role:ev.evaluatorRole,to:tn,dept:tdept});
      if(val.score<=rules.caseLow&&val.score>0) redFlags.push({evalId:ev.id,key,val,from:fn,role:ev.evaluatorRole,to:tn,dept:tdept});
    });
  });

  const grouped=useMemo(()=>{
    const g={};
    evals.forEach(ev=>{
      // ANALYTICS-1: a deactivated (soft-deleted) target drops out of the detailed per-employee report too,
      // so it stays consistent with empRank and the dashboard aggregates (no "ghost" rows for ex-employees).
      if(!g[ev.eval_to]){const em=allEmps.find(e=>e.id===ev.eval_to);if(!em||em.active==0)return;g[ev.eval_to]={emp:em,evs:[],oS:0,oC:0};}
      let s=0,c=0;VKEYS.forEach(k=>{const sc=effScore(ev.scores?.[k]||{skipped:true},rules.rejectScore);if(sc!==null){s+=sc;c++;if(g[ev.eval_to]){g[ev.eval_to].oS+=sc;g[ev.eval_to].oC++;}}});
      if(g[ev.eval_to]) g[ev.eval_to].evs.push({...ev,avgScore:c>0?(s/c).toFixed(1):0});
    });
    return Object.values(g).map(x=>({...x,oAvg:x.oC>0?(x.oS/x.oC).toFixed(1):0})).sort((a,b)=>a.emp.name.localeCompare(b.emp.name));
  },[evals,allEmps,rules]);

  // Actions
  const modEval=async(evalId,key,action)=>{
    await api('moderate',{evalId,key,action});
    setEvals(p=>p.map(ev=>{if(ev.id===evalId){const ns={...ev.scores};ns[key]={...ns[key],status:action==='approve'?'approved':'rejected'};return{...ev,scores:ns};}return ev;}));
  };
  const deleteEval=async id=>{if(!confirm('Delete?'))return;await api('delete_evaluation',{id});setEvals(p=>p.filter(ev=>ev.id!==id));const res=await api('get_evaluations');if(res&&res.success)setVoterStats(res.voterStats||null);};   // s12 (#1): refresh voter counts after delete
  const saveEditEval=async()=>{
    await api('edit_evaluation',{evalId:editEvalModal.evalId,key:editEvalModal.key,...editScore,score:parseInt(editScore.score)||0});
    const res=await api('get_evaluations');
    if(res.success){setEvals(res.data.map(ev=>({id:ev.id,eval_from:ev.eval_from,fromDept:ev.from_dept,fromProject:ev.from_project,evaluatorRole:ev.evaluator_role,evaluatorLevel:ev.evaluator_level,eval_to:ev.eval_to,toDept:ev.to_dept,scores:ev.scores}))); setVoterStats(res.voterStats||null);}   // s12 (#1): keep voter counts fresh after an edit
    setEditEvalModal(null);
  };
  const togglePause=async()=>{const nv=settings.isSurveyActive?'0':'1';await api('save_settings',{isSurveyActive:nv});setSettings(p=>({...p,isSurveyActive:!p.isSurveyActive}));pingConfig();};
  const saveSettings=async()=>{
    setSaving(true);
    // Send only filled fields — empty password = "leave unchanged" (passwords are write-only on the server)
    const pl={};
    if(nALog.trim())pl.adminLogin=nALog.trim();
    if(nAPass)pl.adminPass=nAPass;
    if(isSuperAdmin&&nHPass)pl.headPass=nHPass;   // s12 (#3): head password is superadmin-only (controls Final authority)
    if(isSuperAdmin){if(nSLog.trim())pl.superLogin=nSLog.trim();if(nSPass)pl.superPass=nSPass;}
    await api('save_settings',pl);
    setSettings(p=>({...p,...(pl.adminLogin?{adminLogin:pl.adminLogin}:{}),...(pl.superLogin?{superLogin:pl.superLogin}:{})}));
    setNAPass('');setNHPass('');setNSPass('');
    pingConfig();
    setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2500);
  };
  const resetData=async()=>{
    await api('reset_data');
    setEvals([]);
    setShowReset(false);
    // ✅ Чистим локальные следы прошлого замера, чтобы сотрудники могли пройти опрос заново:
    //    done-флаги + сохранённый код + черновики (сервер деактивирует старые коды → берётся новый код).
    try{Object.keys(localStorage).filter(k=>k.startsWith('ccs_done_')||k.startsWith('ccs_mycode_')||k.startsWith('ccs_drafts_')).forEach(k=>localStorage.removeItem(k));}catch(_){}
  };
  const saveEmp=async f=>{await api('save_employee',f);const r=await api('get_employees');if(r.success)setAllEmps(r.data);reloadPhotos();};
  const delEmp=async id=>{if(!confirm(t.confirm_deactivate))return;await api('delete_employee',{id});const r=await api('get_employees');if(r.success)setAllEmps(r.data);};
  const restEmp=async id=>{await api('restore_employee',{id});const r=await api('get_employees');if(r.success)setAllEmps(r.data);};
  const toggleSetting=async key=>{const nv=settings[key]==='1'?'0':'1';await api('save_settings',{[key]:nv});setSettings(p=>({...p,[key]:nv}));pingConfig();};
  const setDeviceMode=async m=>{await api('save_settings',{codeDeviceMode:m});setSettings(p=>({...p,codeDeviceMode:m}));pingConfig();};   // s14 §2.2 kick/block
  const setEmpRateHeadScope=async m=>{await api('save_settings',{empRateHeadScope:m});setSettings(p=>({...p,empRateHeadScope:m}));pingConfig();};   // s16 §1 all|direct
  const setCodeLife=async h=>{const m=Math.max(1,Math.min(24,parseInt(h)||5))*60;await api('save_config',{key:'codeEditWindowMin',value:m});setSettings(p=>({...p,codeEditWindowMin:String(m)}));pingConfig();};   // s14 §2.1 code lifetime (hours→min)

  const surveyTabs=[
    ['dash',BarChart3,t.t_dash,null],
    ...(settings.progressMonitoring==='1'?[['progress',Activity,t.t_progress,null]]:[]),   // s14 §3.1
    ['details',List,t.t_det,null],
    ['anomalies',Star,t.t_mod,anomalies.length],
    ['redflags',Flag,t.t_red,redFlags.length],
  ];
  const peopleTabs=isSuperAdmin?[
    ['employees',Users,t.t_emp,null],
    ['bdays',Calendar,t.t_bday,null],
  ]:[];
  const settingsTabs=[
    ['settings',Settings,t.t_set,null],
  ];
  const allTabKeys=[...surveyTabs,...peopleTabs,...settingsTabs].map(t=>t[0]);

  const activeEmps=allEmps.filter(e=>e.active!=0);
  const inactiveEmps=allEmps.filter(e=>e.active==0);
  const empQuery=empQ.trim().toLowerCase();
  const filteredActiveEmps=empQuery
    ? activeEmps.filter(e=>{
        const hay=[e.id,e.name,e.position,e.dept,e.project,e.head_role,e.email,e.phone].filter(Boolean).join(' ').toLowerCase();
        return hay.includes(empQuery);
      })
    : activeEmps;

  return(
    <div className="flex flex-col md:flex-row gap-4 sm:gap-5" style={{height:'calc(100vh - 90px)'}}>
      {/* Sidebar */}
      <div className={`w-full md:w-60 ${theme.card} rounded-2xl border ${theme.border} p-3 flex flex-row md:flex-col gap-1 shadow-sm overflow-x-auto md:overflow-y-auto md:overflow-x-visible scrollbar flex-shrink-0`}>
        <div className="hidden md:block px-3 pt-2 pb-3">
          <p className={`text-[11px] font-black tracking-tight ${theme.txt}`}>CCS Platform</p>
          {isSuperAdmin&&<span className="badge-super mt-1 inline-block">{t.super_t}</span>}
        </div>
        {/* Group: SURVEY */}
        <div className="hidden md:block px-3 pt-3 pb-1">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t.grp_survey}</p>
        </div>
        {surveyTabs.map(([k,Icon,lbl,badge])=>(
          <button key={k} onClick={()=>setAtab(k)}
            className={`flex-shrink-0 flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150 ${atab===k?'bg-[#00C76E]/15 text-[#00C76E] font-bold':`${theme.muted} ${theme.hover}`}`}>
            <Icon size={16} className={atab===k?'text-[#00C76E]':''}/>
            <span className="hidden md:inline whitespace-nowrap">{lbl}</span>
            {badge>0&&<span className={`ml-auto text-[10px] font-black px-1.5 py-0.5 rounded-full ${k==='redflags'?'bg-red-500/15 text-red-400':'bg-[#00C76E]/15 text-[#00C76E]'}`}>{badge}</span>}
          </button>
        ))}
        {/* Group: СОТРУДНИКИ */}
        {peopleTabs.length>0&&<>
          <div className="hidden md:block px-3 pt-3 pb-1">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t.grp_people}</p>
          </div>
          {peopleTabs.map(([k,Icon,lbl,badge])=>(
            <button key={k} onClick={()=>setAtab(k)}
              className={`flex-shrink-0 flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150 ${atab===k?'bg-[#00C76E]/15 text-[#00C76E] font-bold':`${theme.muted} ${theme.hover}`}`}>
              <Icon size={16} className={atab===k?'text-[#00C76E]':''}/>
              <span className="hidden md:inline whitespace-nowrap">{lbl}</span>
            </button>
          ))}
        </>}
        {/* Group: SETTINGS */}
        <div className="hidden md:block px-3 pt-3 pb-1">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">{t.grp_settings}</p>
        </div>
        {settingsTabs.map(([k,Icon,lbl])=>(
          <button key={k} onClick={()=>setAtab(k)}
            className={`flex-shrink-0 flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-semibold transition-all duration-150 ${atab===k?'bg-[#00C76E]/15 text-[#00C76E] font-bold':`${theme.muted} ${theme.hover}`}`}>
            <Icon size={16} className={atab===k?'text-[#00C76E]':''}/>
            <span className="hidden md:inline whitespace-nowrap">{lbl}</span>
          </button>
        ))}
      </div>

      {/* Content */}
      <div className={`flex-1 ${theme.card} rounded-2xl border ${theme.border} p-5 sm:p-7 overflow-y-auto scrollbar shadow-sm min-w-0`}>

        {/* DASH - DCS cards */}
        {atab==='dash'&&(
          <div className="fade-up space-y-6">
            <div className="flex items-center justify-between mb-2">
              <h2 className={`text-xl font-black ${theme.txt} flex items-center gap-2`}><span className="w-8 h-8 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><BarChart3 size={18} className="text-[#00C76E]"/></span>{t.dept_dcs}</h2>
              <div className="flex gap-2">
                <button onClick={()=>window.location.href=`${API}?action=export_csv`} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}><Download size={13} className="text-[#00C76E]"/>CSV</button>
                <button onClick={()=>window.location.href=`${API}?action=export_xlsx`} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#3B82F6] transition-all`}><Download size={13} className="text-[#3B82F6]"/>XLSX</button>
                <div className="bg-[#00C76E]/10 text-[#00C76E] border border-[#00C76E]/20 px-3 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5"><Crown size={13}/>{t.target}</div>
              </div>
            </div>
            <AnalyticsView evals={evals} voterStats={voterStats} allEmps={allEmps} theme={theme} t={t} rules={rules} weights={weights} cfg={settings}/>
          </div>
        )}

        {/* PROGRESS MONITOR (s14 §3.1) */}
        {atab==='progress'&&<div className="fade-up"><ProgressMonitor theme={theme} t={t}/></div>}

        {/* DETAILS */}
        {atab==='details'&&(()=>{
          const visible=grouped.filter(g=>(!fDept||g.emp.dept===fDept)&&(!fEmp||g.emp.id===fEmp));
          const isOpen=id=>expandedReport.has(id)||(!!fEmp&&fEmp===id);   // picking one employee auto-expands it
          const toggle=id=>setExpandedReport(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});
          return(
          <div className="fade-up space-y-5">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
              <h2 className={`text-xl font-black ${theme.txt} flex items-center gap-2`}><span className="w-8 h-8 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><List size={18} className="text-[#00C76E]"/></span>{t.t_det}<span className={`text-xs font-bold ${theme.muted}`}>({visible.length})</span></h2>
              <div className="flex flex-wrap gap-2 items-center">
                <button onClick={()=>setExpandedReport(new Set(visible.map(g=>g.emp.id)))} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}><ChevronDown size={13} className="text-[#00C76E]"/>{t.expand_all}</button>
                <button onClick={()=>setExpandedReport(new Set())} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}><ChevronUp size={13} className="text-[#00C76E]"/>{t.collapse_all}</button>
                <button onClick={()=>window.location.href=`${API}?action=export_csv`} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#00C76E] transition-all`}><Download size={13} className="text-[#00C76E]"/>CSV</button>
                <button onClick={()=>window.location.href=`${API}?action=export_xlsx`} className={`flex items-center gap-1.5 text-xs font-bold px-3 py-2 rounded-xl ${theme.input} ${theme.sub} border ${theme.border} hover:border-[#3B82F6] transition-all`}><Download size={13} className="text-[#3B82F6]"/>XLSX</button>
                <select className={`px-3 py-2 rounded-xl text-xs border outline-none ${theme.input} ${theme.txt} ${theme.border} focus:border-[#00C76E]`} value={fDept} onChange={e=>{setFDept(e.target.value);setFEmp('');}}>
                  <option value="">{t.f_all}</option>{[...new Set(allEmps.map(e=>e.dept))].map(d=><option key={d} value={d}>{d}</option>)}
                </select>
                <select className={`px-3 py-2 rounded-xl text-xs border outline-none ${theme.input} ${theme.txt} ${theme.border} focus:border-[#00C76E]`} value={fEmp} onChange={e=>setFEmp(e.target.value)}>
                  <option value="">{t.f_all_emp}</option>{grouped.filter(g=>!fDept||g.emp.dept===fDept).map(g=><option key={g.emp.id} value={g.emp.id}>{g.emp.name}</option>)}
                </select>
              </div>
            </div>
            <div className="space-y-3">
              {visible.map(group=>{const open=isOpen(group.emp.id);return(
                <div key={group.emp.id} className={`${theme.card2} rounded-2xl border ${theme.border} overflow-hidden`}>
                  <div onClick={()=>toggle(group.emp.id)} className={`flex justify-between items-center gap-3 p-4 cursor-pointer select-none ${theme.hover} transition-colors ${open?`border-b ${theme.border}`:''}`}>
                    <div className="flex items-center gap-3 min-w-0">
                      <ChevronRight size={16} className={`flex-shrink-0 ${theme.muted} transition-transform ${open?'rotate-90':''}`}/>
                      <EmpPhoto id={group.emp.id} name={group.emp.name} size={40}/>
                      <div className="min-w-0"><h3 className={`font-black text-base ${theme.txt} truncate`}>{group.emp.name}{group.emp.is_head==1&&<span className="text-xs text-yellow-500 ml-1.5">({group.emp.head_role})</span>}</h3><p className={`text-xs ${theme.muted} truncate`}>{group.emp.dept} · {group.emp.project} · {group.evs.length} {t.evals.toLowerCase()}</p></div>
                    </div>
                    <div className="text-center flex-shrink-0"><div className={`text-[10px] ${theme.muted} mb-0.5`}>{t.avg_s}</div><div className={`text-2xl font-black`} style={{color:group.oAvg>0?scoreClr(group.oAvg):'#94a3b8'}}>{group.oAvg>0?group.oAvg:'—'}</div></div>
                  </div>
                  {open&&<div className="space-y-3 p-4">
                    {group.evs.map((ev,idx)=>{
                      // Anonymity (s11): label by ROLE only — the author's name is confidential (reveal only via the
                      // logged "Служебное раскрытие" channel), so the detailed report never exposes who voted.
                      const ft=ev.evaluatorRole==='manager'?t.head_t:t.emp_t;
                      return(
                        <div key={idx} className={`${theme.input} rounded-xl p-4 border ${theme.border} hover:border-[#00C76E]/30 transition-all`}>
                          <div className="flex justify-between items-center mb-3">
                            <span className={`text-xs ${theme.sub}`}>{t.eval_from} <strong className={theme.txt}>{ft}</strong>{ev.evaluatorRole==='manager'&&<span className="inline-flex align-middle ml-1.5 text-[9px] font-black text-[#00C76E] border border-[#00C76E]/40 px-1.5 py-0.5 rounded leading-none">HEAD</span>}</span>
                            <div className="flex items-center gap-2">
                              <span className="text-xs bg-[#00C76E] text-white px-2 py-1 rounded-lg font-black">{ev.avgScore}</span>
                              {isSuperAdmin&&<button onClick={()=>deleteEval(ev.id)} className="text-red-400 hover:text-red-500 transition-colors p-1"><Trash2 size={13}/></button>}
                            </div>
                          </div>
                          <div className="flex flex-wrap gap-1.5 mb-3">
                            {VKEYS.map(k=>{const v=ev.scores?.[k]||{};return(
                              <div key={k} onClick={isSuperAdmin?()=>{setEditEvalModal({evalId:ev.id,key:k,val:v});setEditScore({score:v.score||'',text:v.text||'',status:v.status||'approved'});}:undefined}
                                className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs border transition-all ${isSuperAdmin?'cursor-pointer hover:border-[#00C76E]/50':''} ${theme.card} ${theme.border}`}>
                                <span className={theme.muted}>{t.vals[k].name}:</span>
                                <strong className={v.skipped?theme.muted:'font-black'} style={{color:v.skipped?undefined:scoreClr(v.score||0)}}>{v.skipped?'—':v.score}</strong>
                                {isSuperAdmin&&<Edit2 size={9} className="text-[#00C76E]/50"/>}
                              </div>
                            );})}
                          </div>
                          <div className="space-y-2">
                            {VKEYS.map(k=>{const v=ev.scores?.[k]||{};if(v.skipped||!v.text)return null;return(
                              <div key={k} className={`text-xs ${theme.sub} ${theme.card} p-3 rounded-xl border ${theme.border}`}>
                                <strong className={`${theme.txt} block mb-1 uppercase text-[10px] tracking-wider`}>{t.vals[k].name}</strong>
                                <span className="italic">"{v.text}"</span>
                              </div>
                            );})}
                          </div>
                        </div>
                      );
                    })}
                  </div>}
                </div>
              );})}
              {visible.length===0&&<div className={`text-center py-12 ${theme.muted} text-sm`}>{t.no_data}</div>}
            </div>
          </div>
          );})()}

        {/* ANOMALIES (Moderation) — SCALE-LABELS: dynamic threshold + case-required hint */}
        {atab==='anomalies'&&(
          <div className="fade-up">
            <h2 className={`text-xl font-black ${theme.txt} mb-1 flex items-center gap-2`}><span className="w-8 h-8 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Star size={18} className="text-[#00C76E]"/></span>{t.mod_q} <span className={`text-sm font-bold ${theme.muted}`}>(≥{rules.moderationThreshold})</span></h2>
            <p className={`text-xs ${theme.muted} mb-5`}>{t.mod_hint.replace('{m}',rules.moderationThreshold).replace('{c}',rules.caseHighReq)}</p>
            {anomalies.length===0?<div className={`text-center py-16 ${theme.muted}`}><CheckCircle size={48} className="mx-auto mb-4 opacity-30"/><p className="text-sm">{t.q_empty}</p></div>:(

                </thead>
                <tbody className={`divide-y ${theme.divider}`}>

                {[['globalAlwaysRecommended',t.feat_global_rec],['progressMonitoring',t.feat_progress],['smartAnalytics',t.feat_smart],['codeSingleSession',t.feat_single_sess]].map(([key,lbl])=>(
                  <div key={key} className={`flex items-center justify-between ${theme.input} px-4 py-3 rounded-xl border ${theme.border}`}>
                    <span className={`text-sm ${theme.sub}`}>{lbl}</span>
                    <Toggle on={settings[key]!=='0'} onChange={()=>toggleSetting(key)} theme={theme}/>

                    <div className={`flex ${theme.card2} rounded-lg p-0.5 text-[11px] font-bold flex-shrink-0`}>

            {/* Dept limits — superadmin only */}
            {isSuperAdmin&&(
              <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>

                <DeptLimitsTable settings={settings} subStats={subStats} setSubStats={setSubStats} allEmps={allEmps} theme={theme} t={t}/>
              </div>

            {/* s14 §2.4 — per-dept code-generation cap (superadmin, only meaningful when codes are enabled) */}

              <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>
                <h3 className={`font-bold ${theme.txt} mb-2 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Lock size={16} className="text-[#00C76E]"/></span>{t.code_limits_title}</h3>

                {isSuperAdmin&&<Inp label={t.p_head} value={nHPass} onChange={setNHPass} theme={theme} type="password" placeholder={t.p_keep}/>}
                {isSuperAdmin&&(
                  <div className={`pt-4 border-t ${theme.border} space-y-3`}>
                    <div className="flex items-center gap-2"><span className="badge-super">{t.super_t}</span><span className={`text-xs ${theme.muted}`}>{t.super_creds}</span></div>
                    <Inp label={t.l_super} value={nSLog} onChange={setNSLog} theme={theme}/>
                    <Inp label={t.p_super} value={nSPass} onChange={setNSPass} theme={theme} type="password" placeholder={t.p_keep}/>

/* ── PERIOD RESET PANEL ───────────────────────────────────── */
function PeriodResetPanel({settings,setSettings,theme,t,setEvals}){

  const go=async()=>{setBusy(true);const r=await api('reset_period',{period,clearEvals:clearE});if(r.success){setSettings(p=>({...p,currentPeriod:period}));if(clearE)setEvals([]);pingConfig();}setBusy(false);setConfirm(false);};
  return(
    <div className="space-y-3">
      <div className="flex gap-3"><input type="month" value={period} onChange={e=>setPeriod(e.target.value)} className={`flex-1 px-3.5 py-2.5 rounded-xl text-sm border outline-none focus:border-[#00C76E] ${theme.input} ${theme.txt} ${theme.border}`}/>

}

/* ── DEPT LIMITS TABLE ────────────────────────────────────── */
function DeptLimitsTable({settings,subStats,setSubStats,allEmps,theme,t}){
  const combos=[...new Set(allEmps.filter(e=>e.active!=0).map(e=>e.project+'|'+e.dept))].map(k=>{const[p,d]=k.split('|');return{project:p,dept:d,key:k};});
  const statsMap={};(subStats.data||[]).forEach(r=>{statsMap[r.project+'|'+r.dept]=r.count;});
  const limMap=subStats.limits||{};
  // Refresh the table after saving so the new limit/count/Status reflect immediately (no manual reload).
  const setLimit=async(p,d,v)=>{await api('set_dept_limit',{project:p,dept:d,limit:parseInt(v)||0});const r=await api('get_submission_stats');if(r&&r.success&&setSubStats)setSubStats(r);};
  return(
    <div className={`overflow-x-auto rounded-xl border ${theme.border}`}>
      <table className="w-full text-xs min-w-[480px]">
        <thead className={theme.thead}><tr><th className="p-3">{t.p_col}</th><th className="p-3">{t.d_col}</th><th className="p-3 text-center">{t.sub_cnt}</th><th className="p-3 text-center">{t.limit}</th><th className="p-3 text-center">{t.status_col}</th></tr></thead>
        <tbody className={`divide-y ${theme.divider}`}>
          {combos.map(({project,dept,key})=>{const cnt=statsMap[key]||0;const lim=limMap[key]||0;const over=lim>0&&cnt>=lim;return(
            <tr key={key} className={theme.trow}>
              <td className={`p-3 ${theme.muted}`}>{project}</td>
              <td className={`p-3 font-semibold ${theme.txt}`}>{dept}</td>
              <td className={`p-3 text-center font-black`} style={{color:over?'#EF4444':'#00C76E'}}>{cnt}</td>
              <td className="p-3 text-center"><input type="number" min="0" defaultValue={lim||''} placeholder="∞" onBlur={e=>setLimit(project,dept,e.target.value)} className={`w-16 px-2 py-1 rounded-lg text-center text-sm border outline-none focus:border-[#00C76E] ${theme.input} ${theme.txt} ${theme.border}`}/></td>
              <td className="p-3 text-center">{over?<span className="text-red-400 font-bold">Full</span>:<span className="text-[#00C76E] font-bold">OK</span>}</td>
            </tr>
          );})}
        </tbody>
      </table>
    </div>
  );
}

/* ── CODE LIMITS TABLE (s14 §2.4) ─────────────────────────── */
// Superadmin per-dept cap on self-generated codes. Stored in settings.codeLimits ('project|dept' => max). Empty/0 →
// generate_my_code caps at dept headcount (default). Anonymity-safe: only counts, no names.
function CodeLimitsTable({settings,allEmps,theme,t,refreshConfig}){
  const list=allEmps.filter(e=>e.active!=0&&e.is_head!=1);
  const combos=[...new Set(list.map(e=>e.project+'|'+e.dept))].map(k=>{const[p,d]=k.split('|');return{project:p,dept:d,key:k};});
  const hc={};list.forEach(e=>{const k=e.project+'|'+e.dept;hc[k]=(hc[k]||0)+1;});
  let limits={};try{limits=JSON.parse(settings.codeLimits||'{}')||{};}catch(_){}
  const setLimit=async(key,v)=>{const obj={...limits};const n=parseInt(v)||0;if(n>0)obj[key]=n;else delete obj[key];await api('save_settings',{codeLimits:JSON.stringify(obj)});pingConfig();if(refreshConfig)await refreshConfig();};
  return(
    <div className={`overflow-x-auto rounded-xl border ${theme.border}`}>
      <table className="w-full text-xs min-w-[420px]">
        <thead className={theme.thead}><tr><th className="p-3">{t.p_col}</th><th className="p-3">{t.d_col}</th><th className="p-3 text-center">{t.headcount_col}</th><th className="p-3 text-center">{t.code_limit_col}</th></tr></thead>
        <tbody className={`divide-y ${theme.divider}`}>
          {combos.map(({project,dept,key})=>{const h=hc[key]||0;const lim=limits[key]||0;return(
            <tr key={key} className={theme.trow}>
              <td className={`p-3 ${theme.muted}`}>{project}</td>
              <td className={`p-3 font-semibold ${theme.txt}`}>{dept}</td>
              <td className={`p-3 text-center font-black text-[#00C76E]`}>{h}</td>
              <td className="p-3 text-center"><input type="number" min="0" defaultValue={lim||''} placeholder={String(h)} onBlur={e=>setLimit(key,e.target.value)} className={`w-16 px-2 py-1 rounded-lg text-center text-sm border outline-none focus:border-[#00C76E] ${theme.input} ${theme.txt} ${theme.border}`}/></td>
            </tr>
          );})}
        </tbody>
      </table>
    </div>
  );
}


/* ── VALUES CONFIG EDITOR (M5 bilingual) ──────────────────── */
function ValuesConfigEditor({valuesConfig,setValuesConfig,theme,t,refreshConfig}){
  const VKEYS=['commitment','communication','expertise','personality'];
  const[editing,setEditing]=useState(null);
  const[f,setF]=useState({n:'',d:''});
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);
  // Single canonical value (not translated) — read the legacy single key, ignore _ru/_uz.
  const g=(key,field)=>valuesConfig[`value_${key}_${field}`] ?? '';

  const startEdit=key=>{
    setEditing(key);
    setF({n:g(key,'name'),d:g(key,'desc')});
    setSaved(false);
  };
  const cancelEdit=()=>setEditing(null);
  const saveEdit=async()=>{
    if(!editing)return;
    setSaving(true);
    // Write the single canonical keys + keep _ru/_uz in sync (identical) so nothing diverges or "translates".
    const payload={
      [`value_${editing}_name`]:f.n,[`value_${editing}_desc`]:f.d,
      [`value_${editing}_name_ru`]:f.n,[`value_${editing}_name_uz`]:f.n,
      [`value_${editing}_desc_ru`]:f.d,[`value_${editing}_desc_uz`]:f.d,
    };
    await api('save_values_config',payload);
    setValuesConfig(p=>({...p,...payload}));
    pingConfig(); if(refreshConfig) refreshConfig();
    setSaving(false);setSaved(true);
    setTimeout(()=>{setSaved(false);setEditing(null);},1200);
  };
  const inp=(label,val,on)=>(
    <div><label className={`block text-xs font-semibold mb-1 ${theme.muted}`}>{label}</label>
      <input value={val} onChange={e=>on(e.target.value)} className={`w-full px-3 py-2 rounded-lg text-sm border outline-none focus:border-[#00C76E] transition-all ${theme.card} ${theme.txt} ${theme.border}`}/></div>
  );

  return(
    <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>
      <h3 className={`font-bold ${theme.txt} mb-4 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Edit2 size={16} className="text-[#00C76E]"/></span>{t.values_cfg_title}</h3>
      <p className={`text-xs ${theme.muted} mb-3`}>{t.values_cfg_hint}</p>
      <div className="space-y-3">
        {VKEYS.map(key=>{
          const isEditing=editing===key;
          const name=t.vals[key].name; const desc=t.vals[key].desc;
          const nameOk=f.n.trim();
          return(
            <div key={key} className={`${theme.input} rounded-xl border ${isEditing?'border-[#00C76E]/50':theme.border} p-4 transition-all`}>
              {isEditing?(
                <div className="space-y-3">
                  <div className="grid grid-cols-1 gap-3">
                    {inp(t.value_name_label,f.n,v=>setF(p=>({...p,n:v})))}
                    {inp(t.value_desc_label,f.d,v=>setF(p=>({...p,d:v})))}
                  </div>
                  {!nameOk&&<p className="text-xs text-red-400">{t.value_name_req}</p>}
                  <div className="flex gap-2">
                    <button onClick={saveEdit} disabled={saving||!nameOk}
                      className="flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white disabled:opacity-50 transition-all">
                      {saving?<span className="spinner"/>:saved?<CheckCircle size={13}/>:<Save size={13}/>}
                      {saved?t.save_done:t.save}
                    </button>
                    <button onClick={cancelEdit} className={`px-3 py-2 rounded-lg text-xs font-bold ${theme.border} border ${theme.sub} transition-all`}>{t.cancel}</button>
                  </div>
                </div>
              ):(
                <div className="flex items-start justify-between gap-3">
                  <div className="min-w-0">
                    <div className={`text-sm font-black ${theme.txt}`}>{name}</div>
                    {desc&&<div className={`text-xs ${theme.muted} mt-0.5 truncate`}>{desc}</div>}
                  </div>
                  <button onClick={()=>startEdit(key)}
                    className={`flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ${theme.card} border ${theme.border} hover:border-[#00C76E] hover:text-[#00C76E] ${theme.muted} transition-all`}>
                    <Edit2 size={13}/>
                  </button>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── RULES CONFIG EDITOR (M3) ─────────────────────────────── */
function RulesConfigEditor({rules,refreshConfig,theme,t}){
  const[f,setF]=useState({...rules});
  const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(false);
  useEffect(()=>{setF({...rules});},[rules.caseHigh,rules.caseLow,rules.caseHighReq,rules.moderationThreshold,rules.rejectScore,rules.caseRequiredHigh,rules.caseRequiredLow]);
  const clampInt=(v,min,max)=>{const n=parseInt(v);return isNaN(n)?min:Math.min(max,Math.max(min,n));};
  const save=async()=>{
    setSaving(true);
    await api('save_config',{key:'rulesConfig',value:f});
    pingConfig(); if(refreshConfig) await refreshConfig();
    setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),1800);
  };
  const numField=(label,key,min,max)=>(
    <div>
      <label className={`block text-xs font-semibold mb-1 ${theme.muted}`}>{label}</label>
      <input type="number" min={min} max={max} value={f[key]} onChange={e=>setF(p=>({...p,[key]:clampInt(e.target.value,min,max)}))}
        className={`w-full px-3 py-2 rounded-lg text-sm border outline-none focus:border-[#00C76E] ${theme.input} ${theme.txt} ${theme.border}`}/>
    </div>
  );
  return(
    <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>
      <h3 className={`font-bold ${theme.txt} mb-1 flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Shield size={16} className="text-[#00C76E]"/></span>{t.rules_title}</h3>
      <p className={`text-xs ${theme.muted} mb-4`}>{t.rules_hint}</p>
      <div className="grid grid-cols-2 gap-3 mb-4">
        {numField(t.r_caseHigh,'caseHigh',1,10)}
        {numField(t.r_caseReq,'caseHighReq',1,10)}
        {numField(t.r_caseLow,'caseLow',1,10)}
        {numField(t.r_moder+(f.moderationThreshold>=11?` (${t.r_moder_off})`:''),'moderationThreshold',1,11)}
        {numField(t.r_reject,'rejectScore',1,10)}
      </div>
      <div className="space-y-2 mb-4">
        {[['caseRequiredHigh',t.r_reqHigh],['caseRequiredLow',t.r_reqLow]].map(([k,lbl])=>(
          <div key={k} className={`flex items-center justify-between ${theme.input} px-3 py-2 rounded-lg border ${theme.border}`}>
            <span className={`text-sm ${theme.sub}`}>{lbl}</span>
            <Toggle on={!!f[k]} onChange={()=>setF(p=>({...p,[k]:!p[k]}))} theme={theme}/>
          </div>
        ))}
      </div>
      {f.caseLow>=f.caseHigh&&<p className="text-xs text-red-400 mb-2">caseLow ≥ caseHigh → 4/9.</p>}
      {f.caseHighReq>f.caseHigh&&<p className="text-xs text-amber-500 mb-2 flex items-start gap-1"><AlertTriangle size={13} className="flex-shrink-0 mt-0.5"/>{t.r_caseReq_warn}</p>}
      <button onClick={save} disabled={saving} className="w-full bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-black py-2.5 rounded-xl active:scale-95 disabled:opacity-50 flex justify-center items-center gap-2">
        {saving?<span className="spinner"/>:saved?<CheckCircle size={16}/>:<Save size={16}/>}{saved?t.cfg_saved:t.save}
      </button>
    </div>
  );
}

/* ── WEIGHTS CONFIG EDITOR (M2) ───────────────────────────── */
function WeightsConfigEditor({weights,refreshConfig,theme,t}){
  // M2b: deep-clone the 3 per-role weight profiles so edits don't mutate the parsed prop.
  const cloneVW=w=>({exec:{...w.valueWeights.exec},head:{...w.valueWeights.head},employee:{...w.valueWeights.employee}});
  const cloneVFS=w=>({...(w.valueFinalShare||VFS_DEFAULT)});   // Req4: deep-clone per-value Final shares so edits don't mutate the prop
  const[f,setF]=useState(()=>({...weights,valueWeights:cloneVW(weights),valueFinalShare:cloneVFS(weights)}));
  const[saving,setSaving]=useState(false);const[saved,setSaved]=useState(false);
  useEffect(()=>{setF({...weights,valueWeights:cloneVW(weights),valueFinalShare:cloneVFS(weights)});},
    [weights.enabled,weights.finalShare,weights.execShare,weights.useValueWeights,weights.minPeerForFinalBlend,
     weights.useValueFinalShare,JSON.stringify(weights.valueFinalShare),JSON.stringify(weights.valueWeights)]);
  const sumVW=o=>Object.values(o).reduce((a,b)=>a+(parseInt(b)||0),0);
  const sums={exec:sumVW(f.valueWeights.exec),head:sumVW(f.valueWeights.head),employee:sumVW(f.valueWeights.employee)};
  // WEIGHTS-ZERO: every active profile must sum >0, else it would silently revert to 25/25/25/25.
  const vwInvalid=f.enabled&&f.useValueWeights&&(sums.exec<=0||sums.head<=0||sums.employee<=0);
  const ROLE_PROFILES=[['exec',t.w_vw_exec],['head',t.w_vw_head],['employee',t.w_vw_emp]];
  const save=async()=>{if(vwInvalid)return;setSaving(true);await api('save_config',{key:'weightsConfig',value:f});pingConfig();if(refreshConfig)await refreshConfig();setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),1800);};
  const slider=(label,val,setVal,compLabel)=>(
    <div>
      <div className="flex justify-between text-xs mb-1"><span className={theme.sub}>{label}: <b className={theme.txt}>{val}%</b></span><span className={theme.muted}>{compLabel}: {100-val}%</span></div>
      <input type="range" min="0" max="100" value={val} onChange={e=>setVal(parseInt(e.target.value))} className="w-full accent-[#00C76E]"/>
    </div>
  );
  return(
    <div className={`${theme.card2} rounded-2xl p-5 border ${theme.border}`}>
      <div className="flex items-center justify-between mb-1">
        <h3 className={`font-bold ${theme.txt} flex items-center gap-2`}><span className="w-7 h-7 rounded-lg bg-[#00C76E]/15 flex items-center justify-center flex-shrink-0"><Zap size={16} className="text-[#00C76E]"/></span>{t.weights_title}</h3>
        <Toggle on={!!f.enabled} onChange={()=>setF(p=>({...p,enabled:!p.enabled}))} theme={theme}/>
      </div>
      <p className={`text-xs ${theme.muted} mb-4`}>{t.w_off_hint}</p>
      <div className={f.enabled?'space-y-4':'space-y-4 opacity-40 pointer-events-none'}>
        {slider(t.w_final,f.finalShare,v=>setF(p=>({...p,finalShare:v})),t.w_peer)}
        <div>
          {slider(t.w_exec,f.execShare,v=>setF(p=>({...p,execShare:v})),t.w_linear)}
          <p className={`text-[10px] ${theme.muted} mt-0.5`}>{t.w_exec_note}</p>
        </div>
        <div className={`flex items-center justify-between ${theme.input} px-3 py-2 rounded-lg border ${theme.border}`}>
          <span className={`text-sm ${theme.sub}`}>{t.w_valw}</span>
          <Toggle on={!!f.useValueWeights} onChange={()=>setF(p=>({...p,useValueWeights:!p.useValueWeights}))} theme={theme}/>
        </div>
        {f.useValueWeights&&(
          <div className="space-y-3">
            <p className={`text-[11px] ${theme.muted}`}>{t.w_vw_role_hint}</p>
            {ROLE_PROFILES.map(([role,roleLabel])=>(
              <div key={role} className={`${theme.input} p-3 rounded-lg border ${theme.border}`}>
                <div className={`text-xs font-bold mb-2 ${theme.sub}`}>{roleLabel}</div>
                <div className="grid grid-cols-2 gap-2">
                  {VWK.map(k=>(
                    <div key={k}>
                      <label className={`block text-[11px] font-semibold mb-1 ${theme.muted}`}>{t.vals[k].name}</label>
                      <input type="number" min="0" max="100" value={f.valueWeights[role][k]} onChange={e=>{const nv=Math.min(100,Math.max(0,parseInt(e.target.value)||0));setF(p=>({...p,valueWeights:{...p.valueWeights,[role]:{...p.valueWeights[role],[k]:nv}}}));}}
                        className={`w-full px-2 py-1.5 rounded-lg text-sm border outline-none focus:border-[#00C76E] ${theme.card} ${theme.txt} ${theme.border}`}/>
                    </div>
                  ))}
                  <div className="col-span-2 text-xs flex justify-between"><span className={theme.muted}>{t.w_sum}</span><span style={{fontWeight:700}} className={sums[role]>0?theme.txt:'text-red-400'}>{sums[role]}</span></div>
                </div>
              </div>
            ))}
            {vwInvalid&&<div className="text-xs text-red-400 flex items-start gap-1"><AlertTriangle size={13} className="flex-shrink-0 mt-0.5"/>{t.w_sum_zero}</div>}
          </div>
        )}
        {/* Req4 — per-VALUE Manager(Supervisor)/Employee(Peer) contribution. One slider per corporate value sets how
            much the manager vote weighs for that value; the peer share is the remainder. Overrides the global Final share. */}
        <div className={`flex items-center justify-between ${theme.input} px-3 py-2 rounded-lg border ${theme.border}`}>
          <span className={`text-sm ${theme.sub}`}>{t.w_vfs}</span>
          <Toggle on={!!f.useValueFinalShare} onChange={()=>setF(p=>({...p,useValueFinalShare:!p.useValueFinalShare}))} theme={theme}/>
        </div>
        {f.useValueFinalShare&&(
          <div className="space-y-3">
            <p className={`text-[11px] ${theme.muted}`}>{t.w_vfs_hint}</p>
            {VWK.map(k=>(
              <div key={k} className={`${theme.input} p-3 rounded-lg border ${theme.border}`}>
                <div className={`text-xs font-bold mb-2 ${theme.sub}`}>{t.vals[k].name}</div>
                {slider(t.w_final,f.valueFinalShare[k],v=>setF(p=>({...p,valueFinalShare:{...p.valueFinalShare,[k]:v}})),t.w_peer)}
              </div>
            ))}
          </div>
        )}
        <div>

            :<span>DCS = Final×{f.finalShare}% + Peer×{100-f.finalShare}%</span>}{f.useValueWeights?' · value-weighted':''}
