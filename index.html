<script>
  (function () {
    function ensureOverlay() {
      var el = document.getElementById('__boot_error__');
      if (el) return el;
      el = document.createElement('div');
      el.id = '__boot_error__';
      el.style.cssText = [
        'position:fixed',
        'inset:12px',
        'z-index:99999',
        'background:rgba(255,255,255,.98)',
        'border:1px solid rgba(148,163,184,.7)',
        'border-radius:12px',
        'padding:14px 14px',
        'box-shadow:0 12px 30px rgba(0,0,0,.18)',
        'font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial',
        'color:#0f172a',
        'display:none'
      ].join(';');
      document.documentElement.appendChild(el);
      return el;
    }
    function show(title, details) {
      var el = ensureOverlay();
      el.style.display = 'block';
      el.innerHTML =
        '<div style="font-weight:800;font-size:14px;margin-bottom:8px">Ошибка запуска интерфейса</div>' +
        '<div style="font-size:12px;opacity:.9;margin-bottom:10px">' + title + '</div>' +
        '<pre style="white-space:pre-wrap;word-break:break-word;font-size:12px;line-height:1.35;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px;max-height:55vh;overflow:auto;margin:0">' +
        (details || '') +
        '</pre>' +
        '<div style="font-size:12px;margin-top:10px;opacity:.85">' +
        'Библиотеки (React/Tailwind/Babel) грузятся локально из папки ' +
        '<code style="background:#eef2ff;border:1px solid #c7d2fe;padding:1px 6px;border-radius:8px">./vendor</code>. ' +
        'Если это окно появилось, но интерфейс при этом работает — ошибку, скорее всего, создаёт ' +
        'расширение браузера (переводчик/блокировщик). Открой страницу в приватном окне или отключи расширения.' +
        '</div>';
    }
    // Запоминаем последнюю ошибку, но НЕ показываем оверлей сразу: постороннее
    // исключение (например, от расширения браузера — переводчика/блокировщика,
    // читающего document.body.scrollHeight до появления body) не должно прятать
    // уже работающий интерфейс. Решение принимает bootCheck() ниже.
    var lastError = null;
    window.addEventListener('error', function (e) {
      try { lastError = { t: String(e.message || 'JS error'), d: (e.error && (e.error.stack || String(e.error))) || '' }; } catch (_) {}
    });
    window.addEventListener('unhandledrejection', function (e) {
      try { lastError = { t: 'Unhandled Promise Rejection', d: (e.reason && (e.reason.stack || String(e.reason))) || String(e.reason) }; } catch (_) {}
    });
    function appMounted() {
      var r = document.getElementById('root');
      return !!(r && r.children && r.children.length > 0);
    }
    function bootCheck() {
      try {
        if (appMounted()) return;            // интерфейс отрисовался → посторонние ошибки игнорируем
        if (!window.React || !window.ReactDOM) {
          show('Не загрузились библиотеки React/ReactDOM', 'window.React=' + String(!!window.React) + '\nwindow.ReactDOM=' + String(!!window.ReactDOM));
          return;
        }
        if (!window.LucideReact) {
          show('Не загрузилась библиотека иконок LucideReact', 'window.LucideReact=' + String(!!window.LucideReact));
          return;
        }
        if (lastError) { show(lastError.t, lastError.d); return; }
      } catch (_) {}
    }
    // Две проверки: вторая — на случай, если компиляция Babel ещё идёт к 2.5 c.
    window.setTimeout(bootCheck, 2500);
    window.setTimeout(bootCheck, 7000);
  })();
</script>

<script type="text/babel">

// Mirror of the server validators. Every parser returns a SAFE_DEFAULT on ANY invalidity and never throws;
// defaults reproduce the previous hardcoded behaviour byte-for-byte (case ≥9/≤4, moderation ≥9, reject→5, weights OFF).

  let raw=settings&&settings.rulesConfig;
  if(typeof raw==='string'){try{raw=JSON.parse(raw);}catch(_){raw=null;}}

const VFS_DEFAULT={commitment:50,communication:50,expertise:50,personality:50};

function groupVal(byVal,vw,useVW){

// existing truthiness (isSurveyActive boolean) and sane defaults for missing toggles.
function mergeSettings(prev,data){
  if(!data||typeof data!=='object') return prev;
  const next={...prev,...data};
  if('isSurveyActive' in data) next.isSurveyActive=data.isSurveyActive!=='0';
  next.allowEmpRateHead=next.allowEmpRateHead??'0';
  next.allowHeadRateEmp=next.allowHeadRateEmp??'1';
  next.voluntaryClosedWhenMandatoryDone=next.voluntaryClosedWhenMandatoryDone??'0'; // Req2: never auto-close Recommended (kept for back-compat; survey ignores it)
  next.showExecInRecommended=next.showExecInRecommended??'0'; // Req1: Executive Managers are HIDDEN from Recommended until enabled here
  next.globalNoSkip=next.globalNoSkip??'0';                 // HRD R2: Global members can't skip Global colleagues
  next.globalRatedByAll=next.globalRatedByAll??'0';         // HRD R2 (optional): everyone must rate all Global
  next.globalAlwaysRecommended=next.globalAlwaysRecommended??'1';  // s14 §1.2: Global shown to everyone in Highly Recommended
  next.codeSingleSession=next.codeSingleSession??'1';       // s14 §2.2: one code = one active device
  next.codeDeviceMode=next.codeDeviceMode||'kick';          // s14 §2.2: 'kick' (newest wins) | 'block' (first wins)
  next.progressMonitoring=next.progressMonitoring??'1';     // s14 §3: anonymity-safe progress dashboards
  next.smartAnalytics=next.smartAnalytics??'1';             // s14 §4.2: relative "smart" score metric
  next.currentPeriod=next.currentPeriod||new Date().toISOString().slice(0,7);
  return next;
}

/* ── M1 multi-project helpers ─────────────────────────────── */
// jarr: tolerant parse of a JSON-string / array / empty → array (SAFE_DEFAULT []).
function jarr(v){ if(Array.isArray(v))return v.filter(Boolean); if(typeof v==='string'&&v.trim()){try{const x=JSON.parse(v);return Array.isArray(x)?x.filter(Boolean):[];}catch(_){return [];}} return []; }
// All projects an employee belongs to = primary project ∪ extra projects[]. Single-project = current behaviour.
function empProjects(e){ return [...new Set([e&&e.project,...jarr(e&&e.projects)].filter(Boolean))]; }
function shareProject(a,b){ const pb=new Set(empProjects(b)); return empProjects(a).some(p=>pb.has(p)); }
// s16 §6 — Executive Management = a head with the is_executive flag (CEO/CCO/CPO/CTO; the super-admin sets it in the
// constructor, normalized once by the v7 migration). Everyone else who is a head = Linear Manager.
function isExecHead(e){ return e&&e.is_head==1 && (parseInt(e.is_executive)||0)===1; }
function isLinearHead(e){ return e&&e.is_head==1 && !isExecHead(e); }
// s16 §1 — does this head's evaluation SCOPE cover `emp`? = is `emp` someone this head is responsible for (their line
// manager / a covering exec). Computed from the head's scope ONLY (no Global add, head-rating filters off), so it
// mirrors the server's headScopeKeys. Used by the "direct line manager" mandatory rule.
function headManages(head,emp,emps){
  if(!(head&&head.is_head==1)) return false;
  // Coverage is by DEPT/PROJECT, never by id — the survey-taker may be an anonymous code holder (ac_*) who isn't in
  // the roster. Probe the head's scope with a stand-in carrying emp's routing fields; if it lands in scope, the head
  // is emp's manager. Mirrors the server's headScopeKeys.
  const probe={id:'__erh_probe__',project:emp.project,dept:emp.dept,projects:emp.projects,is_head:0,active:1};
  const sc=getMandatoryTargets(head,emps.concat([probe]),{allowHeadRateEmp:'1',allowEmpRateHead:'1',globalAlwaysRecommended:'0',globalRatedByAll:'0'});
  return sc.some(tg=>tg.id==='__erh_probe__');
}

/* ── getMandatoryTargets ──────────────────────────────────── */
function getMandatoryTargets(user,emps,cfg={}){
  const ok=emps.filter(e=>e.active!=0);
  const ehr=cfg.allowEmpRateHead==='1';
  const hre=cfg.allowHeadRateEmp!=='0';
  const isH=user.is_head==1||user.isHead;
  const role=user.head_role||user.headRole||'';
  const scopeMode=user.scope_mode||'';
  // s17 §4 — a "manual" head (Панель руководителей) has NO auto-derived mandatory set: their scope/role routing is
  // skipped, Global is NOT forced into their mandatory list, and the explicit rate_extra list (set in the panel) IS
  // their entire mandatory set. Everything else — incl. Global — falls through to the optional "Recommended" step.
  const manualHead=isH && (parseInt(user.head_manual)||0)===1;
  let t=[];
  if(isH){
    if(manualHead){ t=[]; }
    else if(scopeMode){
      // M1 configurable scope — overrides the legacy role switch. Multi-project aware.
      const uProj=new Set(empProjects(user));
      if(scopeMode==='all'){ t=ok; }
      else if(scopeMode==='project'){ t=ok.filter(e=>empProjects(e).some(p=>uProj.has(p))); }
      else if(scopeMode==='custom'){
        const sp=new Set(jarr(user.scope_projects)), sd=new Set(jarr(user.scope_depts));
        t=(sp.size||sd.size)?ok.filter(e=>(sp.size?empProjects(e).some(p=>sp.has(p)):true)&&(sd.size?sd.has(e.dept):true)):[];
      }
      else { t=ok.filter(e=>e.dept===user.dept&&empProjects(e).some(p=>uProj.has(p))); } // 'dept' (+ unknown→dept)
    } else {
      // DEFAULT = legacy behaviour, byte-for-byte (proven live routing).
      switch(role){
        case'CEO':t=ok;break;
        case'CTO':t=ok.filter(e=>e.dept==='Development');break;
        case'HR Manager':t=ok.filter(e=>e.dept==='HR');break;
        case'Head of Marketing':t=ok.filter(e=>e.dept==='Marketing');break;
        case'Head of Sales':t=ok.filter(e=>(e.dept==='Sales'&&['Sales Doctor','iBox'].includes(e.project))||e.dept==='Churn');break;
        case'Head of Customer Care':t=ok.filter(e=>e.dept==='Customer Care'&&['Sales Doctor','iBox'].includes(e.project));break;
        case'Head of iDokon':t=ok.filter(e=>['Sales','Customer Care'].includes(e.dept)&&e.project==='iDokon');break;
        case'Product Manager (iBox)':t=ok.filter(e=>e.dept==='Development'&&e.project==='iBox');break;
        case'Senior KA Manager':t=ok.filter(e=>e.dept==='Key Account'&&e.project==='Sales Doctor');break;
        default:t=ok.filter(e=>e.dept===user.dept&&e.project===user.project);
      }
    }
    if(!hre) t=t.filter(e=>e.is_head==1);
  } else {
    // employee: PEERS = colleagues sharing ANY project (multi-project aware). HEADS are added SEPARATELY — not gated by
    // shareProject, because a head's scope (esp. a cross-project exec like a CCO whose primary project differs) may
    // cover the employee even though they don't share a project. s16 fix: build heads from headManages (scope coverage),
    // the same source the server's headScopeKeys uses, so client mandatory set == server scope.
    const erhScope=cfg.empRateHeadScope||'direct';
    const peers=ok.filter(e=>!(e.is_head==1)&&shareProject(e,user));
    let heads=[];
    if(ehr){
      heads=(erhScope==='direct')
        ? ok.filter(e=>e.is_head==1 && headManages(e,user,ok))   // direct: only covering managers (project-independent)
        : ok.filter(e=>e.is_head==1 && shareProject(e,user));    // all: heads sharing the project (legacy)
    }
    t=peers.concat(heads);
  }
  // s14 §1.2 (globalAlwaysRecommended, default ON) — Global participants surface in EVERY user's mandatory set, so
  // their cards appear in the "Highly Recommended" block for everyone (they fall outside own dept+project → bucketed
  // there). Skippable, unlike globalRatedByAll. globalRatedByAll (default OFF) is the stricter variant: same inclusion
  // PLUS no-skip on Global targets (the skip rule keys on globalRatedByAll only, in SurveyView + server backstop).
  // Either flag includes Global; both respect the head-rating policy for the added targets (same filters as above).
  // s17 §4: a manual head is EXEMPT — Global stays optional (Recommended) for them, never forced into mandatory.
  if((cfg.globalAlwaysRecommended==='1' || cfg.globalRatedByAll==='1') && !manualHead){
    let gl=ok.filter(e=>empProjects(e).includes('Global'));
    if(isH){
      // Req: a HEAD's REQUIRED list is ONLY the depts they are head of (their scope computed above) — "Global" is never
      // force-added to a head's mandatory set. (Heads CAN still optionally rate Global people in the Step-2 Recommended
      // browse; Global is mandatory only for ordinary employees.)
      gl=[];
    } else {
      if(!ehr){ gl=gl.filter(e=>!(e.is_head==1)); }
      // Req (Feruz/HRD): a Global HEAD is mandatory for an employee ONLY if that head actually manages them (their
      // head_role scope — e.g. 'HR Manager' ⇒ HR dept only). Applied in EVERY empRateHeadScope mode so a Global,
      // dept-scoped head (HR) never leaks company-wide as a Linear Manager. (Was: gated only in 'direct' mode.)
      else { gl=gl.filter(e=>!(e.is_head==1)||headManages(e,user,ok)); }
    }
    const seen=new Set(t.map(e=>e.id));
    gl.forEach(e=>{ if(!seen.has(e.id)){ t.push(e); seen.add(e.id); } });
  }
  // Req1: Executive Managers (is_executive — CEO/CTO/CCO/CPO) are NEVER mandatory. They are removed from Step 1
  // (Required / Highly Recommended / mandatory managers) for EVERYONE. They surface only in the optional Recommended
  // step (Step 2), and only when the platform toggle `showExecInRecommended` is ON (gated in SurveyView's `vol`).
  let res=t.filter(e=>e.id!==user.id && !isExecHead(e));
  // s17 §2 — per-employee constructor overrides. rate_extra force-ADDS targets to the mandatory set (visible + votable),
  // overriding the auto-rules INCLUDING the exec-hidden rule, so an admin can pin anyone. rate_block then REMOVES
  // targets (hide + forbid). rate_block wins over rate_extra. Server (submit/update) backstops rate_block.
  const xtra=jarr(user.rate_extra);
  if(xtra.length){ const have=new Set(res.map(e=>e.id)); xtra.forEach(id=>{ if(id===user.id||have.has(id))return; const e=ok.find(x=>x.id===id); if(e){ res.push(e); have.add(id); } }); }
  const blk=new Set(jarr(user.rate_block));
  if(blk.size) res=res.filter(e=>!blk.has(e.id));
  return res;
}

/* ── TOP-5 ENTERPRISE TABLE ───────────────────────────────── */
function Top5Cards({empRank,valNames,theme,t,showCoverage}){
  const top=empRank.slice(0,5);
  if(!top.length)return<div className={`text-center py-8 text-sm ${theme.muted}`}>No data</div>;
  const mean=empRank.length?parseFloat((empRank.reduce((s,e)=>s+e.avg,0)/empRank.length).toFixed(1)):0;
  const mono={fontFamily:"'JetBrains Mono',ui-monospace,monospace"};
  return(
    <div className="overflow-x-auto">
      <table className="w-full text-sm border-collapse">
        <thead>
          <tr className={`border-b ${theme.border}`}>
            {['#',t.c_emp,t.c_dept,t.c_final,t.c_trend].map((h,i)=>(
              <th key={h} className={`pb-2.5 text-xs font-semibold tracking-wide ${theme.muted} ${i>=3?'text-right':'text-left'} ${i>0?'pl-3':''}`}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {top.map((e,i)=>{
            const up=e.avg>=mean;
            return(
              <tr key={e.id} className={`border-b ${theme.border} last:border-0 transition-colors ${theme.hover}`}>
                <td className="py-3">{i<3
                  ?<span className="inline-flex items-center justify-center w-6 h-6 rounded-full text-[11px] font-black text-white" style={{background:['#F59E0B','#9CA3AF','#B45309'][i],boxShadow:`0 2px 8px -1px ${['#F59E0B','#9CA3AF','#B45309'][i]}99`}}>{i+1}</span>
                  :<span className={`text-xs ${theme.muted} pl-2`} style={mono}>{i+1}</span>}</td>
                <td className="py-3 pl-3">
                  <div className="flex items-center gap-2">
                    <EmpPhoto id={e.id} name={e.name} size={26}/>

                      <div className={`text-xs font-semibold ${theme.txt} truncate max-w-[120px]`}>{e.name}</div>
                      <div className={`text-[10px] ${theme.muted} flex items-center gap-2`}><span className="flex items-center gap-0.5"><Users2 size={9} className="text-[#00C76E]"/>{e.evCnt} {t.n_voters}</span>{showCoverage&&e.eligible>0&&<span className="text-[#00C76E] font-bold" title={t.m_coverage}>{e.coverage}%</span>}</div>
                    </div>
                  </div>
                </td>
                <td className={`py-3 pl-3 text-xs ${theme.muted} truncate max-w-[90px]`}>{e.dept}</td>
                <td className="py-3 pl-3 text-right">
                  {/* Req3: individual result — absolute (X/10), percent, and a progress bar at a glance */}
                  <div className="inline-flex flex-col items-end gap-1 min-w-[88px]">
                    <span className="text-sm font-black tabular-nums" style={{...mono,color:scoreClr(e.avg)}}>{e.avg}<span className={`text-[10px] font-bold ${theme.muted}`}>/10 · {e.pct}%</span></span>
                    <div className="w-full h-1.5 rounded-full overflow-hidden" style={{background:theme.d?'rgba(255,255,255,.08)':'rgba(0,0,0,.07)'}}>
                      <div className="h-full rounded-full transition-all duration-700" style={{width:`${e.pct}%`,background:scoreClr(e.avg)}}/>
                    </div>
                  </div>
                </td>
                <td className="py-3 pl-3 text-right">
                  <span className="inline-flex items-center gap-0.5 px-2 py-0.5 rounded-full text-xs font-bold"
                    style={{background:up?'rgba(22,163,74,.13)':'rgba(220,38,38,.13)',color:up?'#16A34A':'#DC2626'}}>
                    {up?t.trend_up:t.trend_down}
                  </span>
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

/* ── PROJECT BARS (replaces BarChart2) ───────────────────── */
function ProjectBars({items,theme}){
  if(!items.length)return<div className={`text-center py-8 text-sm ${theme.muted}`}>No data</div>;
  return(
    <div className="space-y-3">
      {items.map(({label,value})=>(
        <div key={label} className="flex items-center gap-3">
          <span className={`text-xs ${theme.muted} w-24 truncate flex-shrink-0`}>{label}</span>
          <div className="flex-1 h-2.5 rounded-full overflow-hidden" style={{background:theme.d?'rgba(255,255,255,.07)':'rgba(0,0,0,.06)'}}>
            <div className="h-full rounded-full transition-all duration-700" style={{width:`${(value/10)*100}%`,background:scoreClr(value)}}/>
          </div>
          <span className="text-xs font-black w-8 text-right tabular-nums flex-shrink-0" style={{color:value>0?scoreClr(value):'#94a3b8'}}>{value||'—'}</span>

/* ── DONUT CHART ──────────────────────────────────────────── */
function Donut({value,max=10,size=80,color='#00C76E',bg='rgba(255,255,255,.1)',label,theme}){
  const r=30,circ=2*Math.PI*r,pct=value/max,dash=pct*circ;
  return(
    <div className="flex flex-col items-center">
      <svg width={size} height={size} viewBox="0 0 80 80">
        <circle cx="40" cy="40" r={r} fill="none" stroke={bg} strokeWidth="8"/>
        <circle cx="40" cy="40" r={r} fill="none" stroke={color} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ/4} strokeLinecap="round"
          style={{transition:'stroke-dasharray .8s cubic-bezier(.22,1,.36,1)'}}/>
        <text x="40" y="40" textAnchor="middle" dominantBaseline="middle" fontSize="16" fontWeight="800" fill={color}>{value>0?value:'-'}</text>
      </svg>
      {label&&<span style={{fontSize:10,fontWeight:600,opacity:.6,marginTop:2}}>{label}</span>}
    </div>
  );
}

/* ── PHOTO COMPONENT ──────────────────────────────────────── */
// B-4: photos are loaded once (get_photos) and shared via context, keyed by employee id, so the
// employee list payload stays light. Components pass `id`; an explicit `photo` data-URL (e.g. the
// edit-modal live preview) still wins for backward-compat.
const PhotoCtx=createContext({photos:{},reloadPhotos:()=>{}});
function PhotoProvider({children}){
  const[photos,setPhotos]=useState({});
  const reloadPhotos=useCallback(()=>api('get_photos').then(r=>{if(r&&r.success)setPhotos(r.data||{});}).catch(()=>{}),[]);
  useEffect(()=>{reloadPhotos();},[reloadPhotos]);
  return <PhotoCtx.Provider value={{photos,reloadPhotos}}>{children}</PhotoCtx.Provider>;
}
function EmpPhoto({photo,id,name,size=40,className=''}){
  const{photos}=useContext(PhotoCtx);
  const initials=(name||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const colors=['#00C76E','#3B82F6','#8B5CF6','#EC4899','#F59E0B','#06B6D4'];
  const clr=colors[(name||'').charCodeAt(0)%colors.length];
  const src=(photo&&photo.startsWith('data:'))?photo:(id&&photos[id])?photos[id]:'';
  if(src)
    return <img src={src} alt={name} className={`object-cover rounded-full ${className}`} style={{width:size,height:size,flexShrink:0}}/>;
  return(
    <div className={`rounded-full flex items-center justify-center font-bold text-white ${className}`}
      style={{width:size,height:size,background:clr,fontSize:size*0.35,flexShrink:0}}>
      {initials||'?'}
    </div>
  );
}

/* ── TOGGLE ───────────────────────────────────────────────── */
function Toggle({on,onChange,label,theme}){
  return(
    <label className="flex items-center gap-3 cursor-pointer select-none">
      <div className="toggle-track" style={{background:on?'#00C76E':'rgba(100,116,139,.4)'}} onClick={onChange}>
        <div className="toggle-thumb" style={{transform:on?'translateX(20px)':'translateX(0)'}}/>
      </div>
      {label&&<span className={`text-sm ${theme.sub}`}>{label}</span>}
    </label>

}

/* ── INPUT ─────────────────────────────────────────────────── */
function Inp({label,value,onChange,type='text',placeholder,theme,className='',required}){

/* ── LOGIN VIEW ───────────────────────────────────────────── */
// R2-CODES: employee self-service code auth — "I have a code" (login) OR "Get my code" (pick yourself →
// generate → save → login). Code = sealed per-person identity for the period; admin no longer hands out codes.
function CodeAuth({onLogin,settings,theme,t,allEmps}){
  const period=settings.currentPeriod||new Date().toISOString().slice(0,7);
  const LSK='ccs_mycode_'+period;
  const saved=(()=>{try{return localStorage.getItem(LSK)||'';}catch(_){return '';}})();
  const[mode,setMode]=useState(saved?'have':'get');
  const[code,setCode]=useState(saved);
  const[proj,setProj]=useState('');const[dept,setDept]=useState('');
  const[gen,setGen]=useState('');
  const[forceNew,setForceNew]=useState(false);   // device-lock: explicit "get a new code" override of the "you already have one" panel
  const[err,setErr]=useState('');const[busy,setBusy]=useState(false);
  // s17 §3 — keep same-origin tabs in sync: if another tab generates & stores the code, reflect it here so this tab
  // shows the same code instead of issuing a second one (the `storage` event fires only in OTHER tabs of this origin).
  useEffect(()=>{
    const onStorage=e=>{ if(e.key===LSK && e.newValue){ setCode(e.newValue); setGen(e.newValue); setForceNew(false); } };
    window.addEventListener('storage',onStorage); return ()=>window.removeEventListener('storage',onStorage);
  },[LSK]);

  const DEPTS={};allEmps.filter(e=>e.active!=0&&e.is_head!=1).forEach(e=>{if(!DEPTS[e.project])DEPTS[e.project]=new Set();DEPTS[e.project].add(e.dept);});
  const projs=Object.keys(DEPTS);
  const depts=proj?[...DEPTS[proj]||[]]:[];

  const doLogin=async c=>{
    setBusy(true);setErr('');
    const r=await api('login_with_code',{code:(c||'').trim()});
    setBusy(false);
    if(r&&r.success){
      const full=allEmps.find(e=>e.id===r.employee_id)||{};
      // audit s9: mirror the anonymous path — pre-check the dept limit so a code user from a full dept sees the
      // limit screen up front instead of filling the whole survey and getting a dead-end at submit.
      let limitReached=false;
      try{ const cs=await api('check_submission',{project:r.project,dept:r.dept}); limitReached=!!(cs&&cs.limitReached); }catch(_){}
      // s11 anonymous pool: a peer code has no person behind it → server returns no name; show the generic label.
      // Timer-from-claim (HRD s13): anchor the corner countdown to the LOCAL clock from secondsLeft so it's immune
      // to client/server clock skew. The server stays the real gate (login/submit/update all enforce expiry).
      const codeDeadline=(r.secondsLeft!=null)?Math.floor(Date.now()/1000)+r.secondsLeft:(r.deadline||null);
      onLogin({...full,id:r.employee_id,name:r.name||t.emp_t,dept:r.dept,project:r.project,is_head:r.is_head==1,head_role:r.head_role,role:r.role,codeLogin:true,limitReached,codeDeadline});
    } else if(r&&r.error==='code_expired') setErr(t.code_expired);
    else if(r&&r.error==='code_in_use') setErr(t.code_in_use);   // s14 §2.2 (block mode): code active on another device
    else setErr(t.code_bad);
  };
  const generate=async()=>{
    if(!proj||!dept)return;
    // s17 §3 (double-code): if THIS browser already stored a code for the period — e.g. another tab just generated it
    // (same-origin localStorage is shared) — reuse it instead of issuing a 2nd one. The server is idempotent too (it
    // returns the same code when the device-lock cookie is present), so this is the fast client-side short-circuit.
    let pre='';try{pre=localStorage.getItem(LSK)||'';}catch(_){}
    if(pre){ setGen(pre);setCode(pre);return; }
    setBusy(true);setErr('');
    // s11: anonymous dept-pool — code is bound to project+dept, never to a name (no self-selection).
    const r=await api('generate_my_code',{project:proj,dept});
    setBusy(false);
    if(r&&r.success){ try{localStorage.setItem(LSK,r.code);}catch(_){}; setGen(r.code);setCode(r.code); }
    else if(r&&r.error==='pool_full') setErr(t.code_pool_full);          // dept pool exhausted → ask HR
    else if(r&&r.error==='code_unavailable') setErr(t.code_already);     // unknown dept (no oracle)
    else if(r&&r.error==='already_generated') setErr(t.code_already_generated);   // device-lock: this device already has an active code
    else if(r&&r.error==='already_completed') setErr(t.code_already_done);        // device-lock: this browser already FINISHED the survey this period
    else setErr(t.code_bad);
  };
  const selCls=`w-full px-3.5 py-3 rounded-xl text-sm border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] focus:ring-2 focus:ring-[#00C76E]/20 transition-all disabled:opacity-40`;

  return(
    <div className="space-y-4 fade-up">
      <div className={`flex ${theme.input} rounded-lg p-1`}>
        <button onClick={()=>{setMode('have');setErr('');}} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${mode==='have'?'bg-[#00C76E] text-white':theme.muted}`}>{t.code_have}</button>
        <button onClick={()=>{setMode('get');setErr('');setGen('');}} className={`flex-1 py-2 rounded-lg text-xs font-bold transition-all ${mode==='get'?'bg-[#00C76E] text-white':theme.muted}`}>{t.code_get}</button>
      </div>
      {mode==='have'&&(
        <form onSubmit={e=>{e.preventDefault();doLogin(code);}} className="space-y-3">
          <label className={`block text-xs font-semibold ${theme.muted}`}>{t.code_login_lbl}</label>
          <input type="text" autoFocus value={code} onChange={e=>{setCode(e.target.value.toUpperCase());setErr('');}} placeholder="••••••" maxLength={12}
            className={`w-full px-3.5 py-3 rounded-xl text-base tracking-[0.3em] font-bold text-center border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] focus:ring-2 focus:ring-[#00C76E]/20 transition-all`}
            style={{fontFamily:"'JetBrains Mono',ui-monospace,monospace"}}/>
          {err&&<p className="text-red-400 text-xs font-medium bg-red-400/10 px-3 py-2 rounded-lg">{err}</p>}
          <button type="submit" disabled={!code||busy} className="w-full py-4 rounded-lg bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-base disabled:opacity-40 shadow-sm shadow-[#00C76E]/25 flex justify-center items-center gap-2 btn-cta">{busy?<><span className="spinner"/>{t.loading}</>:t.code_login_btn}</button>
        </form>
      )}
      {/* DEVICE-LOCK (HRD s13): if this browser already has a code for the period, show it + login instead of silently
          generating a 2nd one (the accidental re-survey path). "Получить новый код" is an explicit, warned escape. */}
      {mode==='get'&&!gen&&saved&&!forceNew&&(
        <div className="space-y-3 text-center">
          <p className={`text-sm font-bold ${theme.txt}`}>{t.code_have_already}</p>
          <div className="text-3xl font-black tracking-[0.3em] text-[#00C76E] select-all" style={{fontFamily:"'JetBrains Mono',ui-monospace,monospace"}}>{saved}</div>
          {err&&<p className="text-red-400 text-xs font-medium bg-red-400/10 px-3 py-2 rounded-lg">{err}</p>}
          <button onClick={()=>doLogin(saved)} disabled={busy} className="w-full py-4 rounded-lg bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-base disabled:opacity-40 shadow-sm shadow-[#00C76E]/25 flex justify-center items-center gap-2 btn-cta">{busy?<><span className="spinner"/>{t.loading}</>:t.code_use}</button>
          <button onClick={()=>{try{localStorage.removeItem(LSK);}catch(_){}setForceNew(true);setCode('');setErr('');}} className={`text-xs ${theme.muted} hover:text-[#00C76E] underline transition-colors`}>{t.code_get_new}</button>
        </div>
      )}
      {mode==='get'&&!gen&&(!saved||forceNew)&&(
        <div className="space-y-3">
          <select className={selCls} value={proj} onChange={e=>{setProj(e.target.value);setDept('');setErr('');}}><option value="">{t.project}</option>{projs.map(p=><option key={p} value={p}>{p}</option>)}</select>
          <select className={selCls} value={dept} onChange={e=>{setDept(e.target.value);setErr('');}} disabled={!proj}><option value="">{t.dept}</option>{depts.map(d=><option key={d} value={d}>{d}</option>)}</select>
          <p className={`text-[11px] ${theme.muted} flex items-start gap-1.5 leading-snug px-0.5`}><Shield size={13} className="text-[#00C76E] flex-shrink-0 mt-0.5"/>{t.code_anon_note}</p>
          {err&&<p className="text-red-400 text-xs font-medium bg-red-400/10 px-3 py-2 rounded-lg">{err}</p>}
          <button onClick={generate} disabled={!proj||!dept||busy} className="w-full py-4 rounded-lg bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-base disabled:opacity-40 shadow-sm shadow-[#00C76E]/25 flex justify-center items-center gap-2 btn-cta">{busy?<><span className="spinner"/>{t.loading}</>:t.code_get}</button>
        </div>
      )}
      {mode==='get'&&gen&&(
        <div className="space-y-3 text-center">
          <p className={`text-xs ${theme.muted}`}>{t.code_yourcode}</p>
          <div className="text-4xl font-black tracking-[0.3em] text-[#00C76E] select-all" style={{fontFamily:"'JetBrains Mono',ui-monospace,monospace"}}>{gen}</div>
          {/* s14 §2.3: prominent, unmissable "save it now — won't be shown again, can't be recovered" warning */}
          <div className="border-2 border-amber-400/60 bg-amber-400/10 rounded-xl px-3.5 py-3 text-left flex items-start gap-2.5">
            <AlertTriangle size={22} className="text-amber-500 flex-shrink-0 mt-0.5"/>
            <div><div className="text-amber-500 font-black text-sm mb-0.5">{t.code_warn_title}</div><div className={`text-xs leading-snug ${theme.txt}`}>{t.code_saved_warn}</div></div>
          </div>
          {/* HRD s13: timer-from-claim warning — code lives N (now 5h) from issuance, no re-survey. */}
          <p className="text-red-500 text-xs font-semibold bg-red-500/10 px-3 py-2.5 rounded-lg flex items-start gap-1.5 text-left leading-snug"><Clock size={14} className="flex-shrink-0 mt-0.5"/>{(t.code_timer_warn||'').replace('{min}',fmtDur(parseInt(settings.codeEditWindowMin||'300',10),t))}</p>
          <button onClick={()=>doLogin(gen)} disabled={busy} className="w-full py-4 rounded-lg bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-base disabled:opacity-40 shadow-sm shadow-[#00C76E]/25 flex justify-center items-center gap-2 btn-cta">{busy?<><span className="spinner"/>{t.loading}</>:t.code_use}</button>
        </div>
      )}
    </div>
  );
}
function LoginView({onLogin,settings,theme,t,allEmps}){

  const codeEnabled=settings.codeLoginEnabled==='1';

  const DEPTS={};allEmps.filter(e=>e.active!=0&&e.is_head!=1).forEach(e=>{if(!DEPTS[e.project])DEPTS[e.project]=new Set();DEPTS[e.project].add(e.dept);});

  const heads=allEmps.filter(e=>e.active!=0&&e.is_head==1);

  const empLogin=async e=>{
    e.preventDefault();setBusy(true);
    const period=settings.currentPeriod||new Date().toISOString().slice(0,7);
    if(localStorage.getItem(LS(proj,dept,period))==='done'){setBusy(false);onLogin({id:`anon_${Date.now()}`,role:'employee',is_head:false,project:proj,dept,name:t.emp_t,alreadyDone:true});return;}
    const res=await api('check_submission',{project:proj,dept});setBusy(false);
    if(res.success&&res.limitReached) onLogin({id:`anon_${Date.now()}`,role:'employee',is_head:false,project:proj,dept,name:t.emp_t,limitReached:true});
    else onLogin({id:`anon_${Date.now()}`,role:'employee',is_head:false,project:proj,dept,name:t.emp_t});

  const headLogin=async e=>{

          {tabs.map(([k,Icon,lbl])=>(
            <button key={k} onClick={()=>{setTab(k);setAErr('');setHErr('');}}
              className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all flex flex-col items-center gap-1 ${tab===k?'bg-[#00C76E] text-white shadow-md':`${theme.muted} ${theme.hover}`}`}>

                <label className={`block text-xs font-semibold mb-1.5 ${theme.muted}`}>{t.dept}</label>

                  <option value="">{t.select}</option>{depts.map(d=><option key={d} value={d}>{d}</option>)}
                </select>

              <button type="submit" disabled={!dept||busy} className="w-full mt-2 py-4 rounded-lg bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-base disabled:opacity-40 shadow-sm shadow-[#00C76E]/25 flex justify-center items-center gap-2 btn-cta">
                {busy?<><span className="spinner"/>{t.loading}</>:t.enter_emp}
              </button>
            </form>
          )}
          {tab==='head'&&(
            <form onSubmit={headLogin} className="space-y-4 fade-up">
              <div>
                <label className={`block text-xs font-semibold mb-1.5 ${theme.muted}`}>{t.head_role}</label>
                <select className={`w-full px-3.5 py-3 rounded-xl text-sm border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] transition-all`} value={hId} onChange={e=>setHId(e.target.value)} required>
                  <option value="">{t.select}</option>{heads.map(h=><option key={h.id} value={h.id}>{h.head_role} ({h.name})</option>)}
                </select>
              </div>
              <div>
                <label className={`block text-xs font-semibold mb-1.5 ${theme.muted}`}>{t.head_pwd}</label>
                <input type="password" className={`w-full px-3.5 py-3 rounded-xl text-sm border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] transition-all`} value={hPwd} onChange={e=>{setHPwd(e.target.value);setHErr('');}} required/>
              </div>
              {hErr&&<p className="text-red-400 text-xs font-medium bg-red-400/10 px-3 py-2 rounded-lg">{hErr}</p>}
              <button type="submit" disabled={!hId||!hPwd} className="w-full py-3.5 rounded-xl bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-sm active:scale-95 disabled:opacity-40 shadow-sm shadow-[#00C76E]/25">{t.enter_head}</button>
            </form>
          )}
          {tab==='admin'&&(
            <form onSubmit={adminLogin} className="space-y-4 fade-up">
              <div>
                <label className={`block text-xs font-semibold mb-1.5 ${theme.muted}`}>{t.admin_login}</label>
                <input type="text" className={`w-full px-3.5 py-3 rounded-xl text-sm border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] transition-all`} value={aLog} onChange={e=>{setALog(e.target.value);setAErr('');}} required/>
              </div>
              <div>
                <label className={`block text-xs font-semibold mb-1.5 ${theme.muted}`}>{t.admin_pwd}</label>
                <input type="password" className={`w-full px-3.5 py-3 rounded-xl text-sm border ${theme.input} ${theme.txt} ${theme.border} outline-none focus:border-[#00C76E] transition-all`} value={aPwd} onChange={e=>{setAPwd(e.target.value);setAErr('');}} required/>
              </div>
              {aErr&&<p className="text-red-400 text-xs font-medium bg-red-400/10 px-3 py-2 rounded-lg">{aErr}</p>}
              <button type="submit" disabled={!aLog||!aPwd} className="w-full py-3.5 rounded-xl bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-bold text-sm active:scale-95 disabled:opacity-40 shadow-sm shadow-[#00C76E]/25">{t.enter_admin}</button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── MAIN DASH ────────────────────────────────────────────── */
function MainDash({user,setView,evals,settings,theme,t,allEmps,cfg}){
  const mand=getMandatoryTargets(user,allEmps,cfg);
  const doneIds=new Set(evals.filter(ev=>ev.eval_from===user.id).map(ev=>ev.eval_to));
  const doneMand=mand.filter(e=>doneIds.has(e.id)).length;
  // audit s9: zero mandatory (e.g. a head with allowHeadRateEmp=0) counts as done — was showing "100% / Start"
  // forever with no Finish path. [].every→done; empty list → nothing required.
  const allDone=doneMand>=mand.length;
  const pct=mand.length?Math.round(doneMand/mand.length*100):100;

  // s14 §3 — anonymity-safe progress beacon: report ONLY counts + finished flag. Server keys it to the session holder
  // (ac_* / head id), stores no name or draft content. Skipped for the pure-anonymous path (no session → server no-op).
  useEffect(()=>{ if(user.codeLogin||user.role==='manager'){ api('save_progress',{rated:doneMand,total:mand.length,finished:allDone}).catch(()=>{}); } },[doneMand,mand.length,allDone]);

  if(user.alreadyDone)return(
    <div className="max-w-lg mx-auto mt-10">
      <div className={`${theme.card} rounded-2xl p-10 shadow-sm border ${theme.border} text-center fade-up`}>
        <div className="w-20 h-20 rounded-full bg-[#00C76E]/15 flex items-center justify-center mx-auto mb-5"><CheckCircle size={40} className="text-[#00C76E]"/></div>
        <h2 className={`text-2xl font-black ${theme.txt} mb-2`}>{t.already_done}</h2>
        <p className={`text-sm ${theme.muted}`}>{user.project} — {user.dept}</p>
      </div>
    </div>
  );
  if(user.limitReached)return(
    <div className="max-w-lg mx-auto mt-10">
      <div className={`${theme.card} rounded-2xl p-10 shadow-sm border border-yellow-500/30 text-center fade-up`}>
        <div className="w-20 h-20 rounded-full bg-yellow-500/10 flex items-center justify-center mx-auto mb-5"><AlertCircle size={40} className="text-yellow-500"/></div>
        <h2 className={`text-2xl font-black ${theme.txt} mb-2`}>{t.limit_hit}</h2>
        <p className={`text-sm ${theme.muted}`}>{user.project} — {user.dept}</p>
      </div>
    </div>
  );

  return(
    <div className="max-w-5xl mx-auto mt-6 sm:mt-10 px-4 sm:px-8">
      <div className={`${theme.card} rounded-2xl p-7 sm:p-9 shadow-sm border ${theme.border} fade-up`}>
        <div className="flex items-center gap-5 mb-8">
          <div className="w-14 h-14 rounded-lg bg-gradient-to-br from-[#00C76E] to-[#00a85d] flex items-center justify-center shadow-sm shadow-[#00C76E]/25 flex-shrink-0">
            {(user.is_head||user.isHead)?<Crown size={26} className="text-white"/>:<User size={26} className="text-white"/>}
          </div>
          <div>
            <h2 className={`text-xl sm:text-2xl font-black ${theme.txt}`}>{t.hi}, <span className="text-[#00C76E]">{(user.is_head||user.isHead)?user.name:user.dept}</span></h2>
            <p className={`text-sm ${theme.muted} mt-0.5`}>{user.project}{(user.is_head||user.isHead)&&` · ${user.head_role||user.headRole}`}</p>
          </div>
        </div>

        {/* Progress block */}
        <div className={`${theme.input} rounded-lg p-5 mb-7 border ${theme.border}`}>
          <div className="flex items-center justify-between mb-3">
            <span className={`text-sm font-semibold ${theme.sub}`}>{t.progress}</span>
            <span className="text-2xl font-black text-[#00C76E]">{doneMand}<span className={`text-base font-semibold ${theme.muted}`}> / {mand.length}</span></span>
          </div>
          <div className={`h-2.5 rounded-full overflow-hidden ${theme.d?'bg-[#0A2B2C]':'bg-slate-200'}`}>
            <div className="h-full rounded-full progress-shine transition-all duration-1000" style={{width:`${pct}%`}}/>
          </div>
          <div className="flex justify-between mt-1.5">
            <span className={`text-xs ${theme.muted}`}>{pct}% {t.done}</span>
            {mand.length-doneMand>0&&<span className={`text-xs ${theme.muted}`}>{mand.length-doneMand} {t.remaining}</span>}
          </div>
        </div>

        {allDone?(
          <div className="space-y-4">
            <div className="bg-gradient-to-r from-[#00C76E]/15 to-[#00a85d]/10 border border-[#00C76E]/30 rounded-lg p-6 text-center">
              <CheckCircle size={36} className="text-[#00C76E] mx-auto mb-3"/>
              <p className={`text-[#00C76E] font-black text-base`}>{t.complete}</p>
            </div>
            {/* FIX: обязательная часть пройдена — это больше НЕ тупик. Руководители и сотрудники могут продолжить
                и оценить других (Recommended). Раньше кнопка входа в опрос пропадала при allDone. */}
            {settings.isSurveyActive&&!user.codeFinished&&(
              <button onClick={()=>setView('survey')} className="w-full flex items-center justify-center gap-2 py-3.5 rounded-lg font-bold text-sm border border-[#00C76E]/40 bg-[#00C76E]/10 text-[#00C76E] hover:bg-[#00C76E]/20 transition-all">
                <Globe size={17}/>{t.go_recommended}
              </button>
            )}
          </div>
        ):settings.isSurveyActive?(
          <button onClick={()=>setView('survey')} className="w-full flex items-center justify-center gap-3 bg-gradient-to-r from-[#00C76E] to-[#00a85d] text-white font-black py-4 rounded-lg text-base shadow-sm shadow-[#00C76E]/30 btn-cta">
            <span>{doneMand>0?t.resume:t.start}</span><ChevronRight size={22}/>
          </button>
        ):(
          <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-5 flex items-center justify-center gap-3 text-yellow-500 font-bold">
            <PauseCircle size={22}/>{t.paused}
          </div>
        )}

        {/* Code-login users: resume on any device & change their votes within the edit window */}
        {user.codeLogin&&doneMand>0&&!user.codeFinished&&(
          <button onClick={()=>setView('editvotes')}
            className={`w-full mt-4 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm border ${theme.border} ${theme.input} ${theme.sub} hover:border-[#00C76E] hover:text-[#00C76E] transition-all`}>
            <Edit2 size={16}/>{t.edit_votes_btn}
          </button>
        )}
        {/* s14 §3.2 — managers see their team's completion progress (server-scoped to their dept, aggregates only) */}
        {(user.role==='manager'||user.is_head)&&settings.progressMonitoring==='1'&&(
          <button onClick={()=>setView('mon')}
            className={`w-full mt-4 flex items-center justify-center gap-2 py-3 rounded-lg font-bold text-sm border ${theme.border} ${theme.input} ${theme.sub} hover:border-[#00C76E] hover:text-[#00C76E] transition-all`}>
            <Activity size={16}/>{t.mon_team}
          </button>
        )}
      </div>
    </div>
  );
}


/* ── SURVEY VIEW ──────────────────────────────────────────── */
function SurveyView({user,setView,setUser,onSubmit,evals,theme,t,allEmps,cfg,rules=RULES_DEFAULT}){
  const[targetId,setTargetId]=useState('');
  const[search,setSearch]=useState('');
  const[tab,setTab]=useState('mandatory');
  const[busy,setBusy]=useState(false);
  const[selectedDept,setSelectedDept]=useState('');
  const emptyS=()=>({commitment:{score:0,text:'',skipped:false},communication:{score:0,text:'',skipped:false},expertise:{score:0,text:'',skipped:false},personality:{score:0,text:'',skipped:false}});
  const[scores,setScores]=useState(emptyS());
  // s12 (FINDING-1): in-progress drafts now PERSIST to localStorage (keyed by holder + period) so a page refresh —
  // the scenario HRD asked to verify — no longer loses un-submitted work. Restored on mount, re-written on every
  // change, removed once everything is submitted. (Same browser-local trust level as the saved access code.)
  const DRAFTSK='ccs_drafts_'+(user.id||'')+'_'+(cfg.currentPeriod||'');
  const draftsRef=useRef((()=>{try{const o=JSON.parse(localStorage.getItem(DRAFTSK)||'{}');return(o&&typeof o==='object'&&!Array.isArray(o))?o:{};}catch(_){return{};}})());
  const persistDrafts=useCallback(()=>{try{const d=draftsRef.current;Object.keys(d).length?localStorage.setItem(DRAFTSK,JSON.stringify(d)):localStorage.removeItem(DRAFTSK);}catch(_){}},[DRAFTSK]);

  const doneIds=new Set(evals.filter(ev=>ev.eval_from===user.id).map(ev=>ev.eval_to));
  const mand=getMandatoryTargets(user,allEmps,cfg).filter(e=>!doneIds.has(e.id));
  // s16 §6 — Step 1 (mandatory) is split into four labelled groups: Required (own team peers), Highly Recommended
  // (other-dept/Global peers), Linear Managers and Executive Management (the heads whose scope covers this employee).
  const mandPeers=mand.filter(e=>!(e.is_head==1));
  const myDept=mandPeers.filter(e=>e.dept===user.dept&&e.project===user.project);
  const other=mandPeers.filter(e=>!(e.dept===user.dept&&e.project===user.project));
  const mandLinear=mand.filter(isLinearHead);
  const mandExec=mand.filter(isExecHead);
  // Req2: the Recommended step (Step 2) is ALWAYS open and interactive — no preliminary lock, no auto-close after
  // the mandatory step is done. (The mandatory-before-FINISH rule still holds via `canFinish` on the Finish button.)
  const volClosed=false;
  const sl=search.toLowerCase();
  const blockSet=new Set(jarr(user.rate_block));   // s17 §2: people the constructor hid from THIS user — gone from Recommended too
  const vol=volClosed?[]:allEmps.filter(e=>
    e.active!=0 &&
    e.id!==user.id &&
    !blockSet.has(e.id) &&
    !(cfg.allowEmpRateHead!=='1' && e.is_head==1) &&
    !(isExecHead(e) && cfg.showExecInRecommended!=='1') &&   // Req1: Executive Managers hidden from Recommended unless the platform toggle is ON
    !getMandatoryTargets(user,allEmps,cfg).some(m=>m.id===e.id) &&
    !doneIds.has(e.id) &&
    (e.name.toLowerCase().includes(sl) || e.dept.toLowerCase().includes(sl))
  );
  // s16 §6.2 — Step 2 (Recommended): the heads NOT directly tied to this employee surface here, grouped by category;
  // peers are still browsed via the department drill-down (peers only — heads shown as their own sections).
  const volPeers=vol.filter(e=>!(e.is_head==1));
  const volLinear=vol.filter(isLinearHead);
  const volExec=vol.filter(isExecHead);
  // Unique departments in the voluntary PEER list
  const volDepts=[...new Set(volPeers.map(e=>e.dept))].sort();
  const volInDept=selectedDept?volPeers.filter(e=>e.dept===selectedDept):[];
  const info=targetId?allEmps.find(e=>e.id===targetId):null;
  // Skip ("Не могу оценить" / "Bilmayman") is available for ANY target OUTSIDE the rater's own dept+project — i.e. for
  // every "Highly Recommended" / "Recommended" card. Req: a Global person who appears in "Highly Recommended" is
  // skippable EXACTLY like any other Highly-Recommended target (the old globalNoSkip/globalRatedByAll no-skip on
  // Global↔Global is intentionally dropped here). Only own-team (Required) colleagues stay non-skippable. The server
  // (submit_evaluation/update_my_evaluation) backstops with the same own-team gate.
  const canSkip=info?!(info.dept===user.dept&&info.project===user.project):false;

  // selectTarget: load draft if exists, else empty. Replaces direct setTargetId calls.
  const selectTarget=useCallback((id)=>{
    setScores(id?(draftsRef.current[id]||emptyS()):emptyS());
    setTargetId(id);
  },[]);

  // Score handlers — also persist to draft immediately so switching person doesn't lose work
  const chgS=(k,v)=>{
    if(!scores[k].skipped){
      const ns={...scores,[k]:{...scores[k],score:v}};
      setScores(ns);
      if(targetId){draftsRef.current[targetId]=ns;persistDrafts();}
    }
  };
  const chgT=(k,v)=>{
    if(!scores[k].skipped){
      const ns={...scores,[k]:{...scores[k],text:v}};
      setScores(ns);
      if(targetId){draftsRef.current[targetId]=ns;persistDrafts();}
    }
  };
  const chgSk=k=>{
    const ns={...scores,[k]:{skipped:!scores[k].skipped,score:0,text:''}};
    setScores(ns);
    if(targetId) draftsRef.current[targetId]=ns;
  };
  const okTxt=tx=>tx.trim().length>5;
  const okVal=v=>{if(v.skipped)return true;if(!v.score)return false;if(caseRequired(v.score,rules)&&!okTxt(v.text))return false;return true;};
  const formOk=targetId&&Object.values(scores).every(okVal)&&Object.values(scores).some(v=>v.score>0||v.skipped);

  const[showConfirm,setShowConfirm]=useState(false);
  const[showConfirm2,setShowConfirm2]=useState(false);   // HRD s13: hard 2nd confirm — "you can't come back"
  const[savedToast,setSavedToast]=useState(false);

  // Collect all valid drafts (including current form if filled)
  const getPendingDrafts=useCallback(()=>{
    const all={...draftsRef.current};
    if(targetId) all[targetId]=scores;
    return Object.entries(all).filter(([id,sc])=>{
      // Skip drafts already submitted this period (doneIds): after a kept-on-error batch (pause/limit) a retry
      // must NOT re-POST the rows that already succeeded — that re-pushed a (harmless but) duplicate local eval
      // row each time (audit s8). doneIds is keyed by eval_to, exactly the draft id here.
      if(doneIds.has(id)) return false;
      return Object.values(sc).every(okVal)&&Object.values(sc).some(v=>v.score>0||v.skipped);
    }).map(([id,sc])=>({id,sc,emp:allEmps.find(e=>e.id===id)}));
  },[targetId,scores,allEmps,rules,doneIds]);

  // UX-1: Required + Highly Recommended must all be submitted OR have a ready draft before "Finish" unlocks.
  const pendingDrafts=getPendingDrafts();
  const readyIds=new Set(pendingDrafts.map(d=>d.id));
  const pendingCount=pendingDrafts.length;
  const mandatoryAll=getMandatoryTargets(user,allEmps,cfg);
  const mandatoryRemaining=mandatoryAll.filter(m=>!doneIds.has(m.id)&&!readyIds.has(m.id));
  const canFinish=mandatoryRemaining.length===0;

  // Shared submitter — server computes moderation status; we mirror it locally for optimistic state.
  // Returns {paused, failed[]} so callers can surface a server rejection instead of silently dropping drafts.
  // (A mid-batch pause now returns survey_paused for every row; without this the batch was wiped + a false
  // "saved" shown — audit s8 HIGH.) already_submitted is treated as success (server-side dedup, idempotent).
  const submitDrafts=async(pending)=>{
    const failed=[];
    for(const{id,sc,emp} of pending){
      const ps={};
      for(const[k,v]of Object.entries(sc)) ps[k]={score:v.score,text:v.text,skipped:v.skipped,status:(!v.skipped&&v.score>=rules.moderationThreshold)?'pending':'approved'};
      const r=await onSubmit({
        id:`ev_${Math.random().toString(36).slice(2,11)}${Math.random().toString(36).slice(2,8)}`,   // opaque (server overrides; no timestamp — s13 #2)
        from:user.id,fromDept:user.dept,fromProject:user.project,
        evaluatorRole:user.role,to:id,toDept:emp?.dept||'',scores:ps
      });
      if(r&&r.error==='survey_paused') return{paused:true,failed};                          // survey frozen → stop, keep all drafts
      if(r&&r.error==='code_expired') return{expired:true,failed};                          // HRD s13: code window elapsed → stop, surface clearly
      if(r&&r.error==='login_required') return{kicked:true,failed};                         // s14 §2.2: this code was opened on another device → our session was kicked
      if(r&&!r.success&&r.error!=='already_submitted') failed.push({id,error:(r&&r.error)||'error'});  // hard reject (limit/inactive…)
    }
    return{paused:false,failed};
  };

  // "Finish" → confirm dialog, then submit everything and leave the survey.
  const handleSubmitClick=()=>{
    if(targetId){draftsRef.current[targetId]=scores;persistDrafts();}
    setShowConfirm(true);
  };
  const doSubmitAll=async()=>{
    setShowConfirm(false);setBusy(true);
    const r=await submitDrafts(getPendingDrafts());
    // On a server rejection, KEEP drafts and STAY in the survey (no false "done"). Successful rows already
    // persisted + are deduped server-side, so a retry after unpause is safe (they return already_submitted).
    if(r.paused){ setBusy(false); alert(t.survey_paused_alert); return; }
    if(r.expired){ setBusy(false); alert(t.code_expired); return; }
    if(r.kicked){ setBusy(false); alert(t.code_kicked); window.location.reload(); return; }   // s14 §2.2: kicked by another device — drafts persist in localStorage, reload → login
    if(r.failed.length){ setBusy(false); alert(r.failed.some(f=>f.error==='limit_reached'||f.error==='inactive')?t.submit_blocked:t.submit_partial_fail); return; }
    // s16 §6.2: explicit FINISH — all drafts are in, so close the code session + mark "Завершил" (deactivates the
    // code: no re-entry/edits, dept slot consumed). Tolerate a benign error (e.g. head session, no code).
    await api('finish_survey',{total:mandatoryAll.length}).catch(()=>{});
    // FIX: a CODE user who explicitly finished has their code deactivated server-side → mark the session finished so
    // the dashboard shows the terminal "completed" state and hides the now-dead-end «продолжить»/«изменить» buttons.
    // Heads (no codeLogin) are NOT locked — they may keep rating Recommended.
    if(user.codeLogin&&setUser) setUser(u=>({...u,codeFinished:true}));
    setBusy(false);
    draftsRef.current={};persistDrafts();selectTarget('');setView('dash');
  };

  // s16 §6.1: Step 1 → Step 2. Persist the open draft, then advance (only when all Step-1 targets are covered).
  const handleNext=()=>{ if(targetId){draftsRef.current[targetId]=scores;persistDrafts();} if(canFinish){ setTab('voluntary'); selectTarget(''); setSelectedDept(''); window.scrollTo({top:0,behavior:'smooth'}); } };

  // "Save" (UX-1, default semantic = submit ready drafts to server, stay in survey so you can return/continue).
  const handleSaveProgress=async()=>{
    if(targetId){draftsRef.current[targetId]=scores;persistDrafts();}
    const pending=getPendingDrafts();
    if(!pending.length) return;
    setBusy(true);
    const r=await submitDrafts(pending);
    setBusy(false);
    if(r.paused){ alert(t.survey_paused_alert); return; }
    if(r.expired){ alert(t.code_expired); return; }       // keep drafts; do NOT show "saved"
    if(r.kicked){ alert(t.code_kicked); window.location.reload(); return; }   // s14 §2.2: kicked by another device
    if(r.failed.length){ alert(r.failed.some(f=>f.error==='limit_reached'||f.error==='inactive')?t.submit_blocked:t.submit_partial_fail); return; }
    draftsRef.current={};persistDrafts();selectTarget('');
    setSavedToast(true);setTimeout(()=>setSavedToast(false),2400);
  };

  const Card=({c})=>{
    const selected=targetId===c.id;
    return(
      <button type="button" onClick={()=>selectTarget(c.id)}
        className={[
          'w-full text-left',
          'px-3.5 py-3.5 rounded-lg',
          'border transition-all duration-150',
          'flex items-center gap-3',
          'min-h-[64px]',
          selected
            ?'border-[#00C76E]/60 bg-[#00C76E]/10 shadow-sm shadow-[#00C76E]/10'
            :`${theme.border} ${theme.input} ${theme.hover}`,
        ].join(' ')}>
        <div className={`relative flex-shrink-0`}>
          <EmpPhoto id={c.id} name={c.name} size={48} className={selected?'ring-2 ring-[#00C76E]/35':''}/>
          {c.is_head==1&&(
            <div className="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-yellow-500 flex items-center justify-center shadow-sm">
              <Crown size={12} className="text-white"/>
            </div>
          )}
        </div>
        <div className="flex-1 min-w-0">
          <div className={`font-semibold ${theme.txt} text-sm leading-5`}>{c.name}</div>
          <div className={`text-[11px] leading-4 ${theme.muted} mt-0.5`}>{c.dept} · {c.project}</div>
        </div>
        <div className="flex items-center gap-2 flex-shrink-0">
          {selected&&<span className="text-[10px] font-black px-2 py-1 rounded-full bg-[#00C76E]/15 text-[#00C76E]">Selected</span>}
          <CheckCircle size={18} className={selected?'text-[#00C76E]':'opacity-0'} />
        </div>
      </button>

  };

  // Large card for 3-4 column grid
  const BigCard=({c})=>{
    const selected=targetId===c.id;
    return(
      <button type="button" onClick={()=>selectTarget(c.id)}
        className={[
          'w-full text-left flex flex-col items-center gap-2 p-4 rounded-lg border transition-all duration-150',
          selected
            ?'border-[#00C76E]/60 bg-[#00C76E]/10 shadow-md shadow-[#00C76E]/10'
            :`${theme.border} ${theme.input} ${theme.hover}`,
        ].join(' ')}>
        <div className="relative mt-1">
          <EmpPhoto id={c.id} name={c.name} size={64} className={selected?'ring-2 ring-[#00C76E]/40 ring-offset-2':''}/>
          {c.is_head==1&&(
            <div className="absolute -bottom-1 -right-1 w-5 h-5 rounded-full bg-yellow-500 flex items-center justify-center shadow-sm">
              <Crown size={11} className="text-white"/>
            </div>
